approach:
  name: "Binary Search Partition"
  tags:
    - "binary-search"
    - "partition"
    - "ownership"

complexity:
  time: "O(log(min(m, n)))"
  space: "O(1)"

text:
  rationale_md: |
    # Rationale

    Rust's i32::MIN and i32::MAX provide sentinel values.
    Borrowing (&Vec<i32>) avoids ownership transfer of input arrays.

    Key advantages in Rust:
    - i32::MIN / i32::MAX as sentinels
    - .max() / .min() methods on numeric types
    - Reference-based swap avoids cloning

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `nums1 = [1,3]`, `nums2 = [2]`:

    1. nums1.len()=2 > nums2.len()=1 → a=&nums2, b=&nums1
    2. m=1, n=2, lo=0, hi=1
    3. **Iteration 1**: partition1=0, partition2=2
       - max_left1=MIN, min_right1=2, max_left2=3, min_right2=MAX
       - max_left2(3) > min_right1(2) → lo = 1
    4. **Iteration 2**: partition1=1, partition2=1
       - max_left1=2, min_right1=MAX, max_left2=1, min_right2=3
       - Valid! Odd total → 2.max(1) = 2 as f64 = 2.0

pitfalls:
  - "Use references (&) to avoid ownership transfer"
  - "usize for indices (unsigned); careful with subtraction"
  - "Cast to f64 at the end for return type"

tradeoffs:
  - "References avoid cloning but add & syntax"
  - "usize prevents negative indices (good safety)"
  - "i32::MIN/MAX are within the constraint range"

comparison_notes:
  highlights:
    - "i32::MIN / i32::MAX for sentinels"
    - ".max() / .min() on i32 type"
    - "as f64 for type conversion"
  gotchas_language_specific:
    - "usize for array indices (can't be negative)"
    - "Borrowing with & to avoid moves"
    - "hi starts at m (usize), subtraction can underflow"

review_questions:
  - "Why use references instead of consuming the Vecs?"
  - "What are the risks of usize subtraction?"
  - "How does Rust's type system help prevent bugs here?"

