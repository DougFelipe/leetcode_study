approach:
  name: "Expand Around Center"
  tags:
    - "expand-around-center"
    - "two-pointers"
    - "closure"

complexity:
  time: "O(n²)"
  space: "O(1)"

text:
  rationale_md: |
    # Rationale

    Go uses a closure to capture and modify outer variables (start, maxLen).
    String slicing s[start:start+maxLen] is efficient for byte strings.

    Key advantages in Go:
    - Closures capture outer variables by reference
    - String slicing is O(1) (returns a view)
    - Byte comparison with s[i] for ASCII

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `s = "babad"`:

    1. expand closure captures start and maxLen
    2. For each i, call expand(i, i) and expand(i, i+1)
    3. When palindrome found that exceeds maxLen, update start and maxLen
    4. Return s[start : start+maxLen]

    Result: "bab" (or "aba")

pitfalls:
  - "Closure captures variables by reference in Go"
  - "String slicing returns bytes, works for ASCII"
  - "s[i] accesses byte, not rune"

tradeoffs:
  - "Closure vs separate function with pointer params"
  - "Byte-level comparison works only for ASCII"
  - "String slice is O(1) but creates new header"

comparison_notes:
  highlights:
    - "Closure func for clean encapsulation"
    - "s[start : start+maxLen] for substring"
    - "Byte comparison for ASCII strings"
  gotchas_language_specific:
    - "No ternary operator; explicit if-else"
    - "Closure captures by reference automatically"
    - "String slicing is byte-based, not rune-based"

review_questions:
  - "How do Go closures differ from Python's nonlocal?"
  - "Why is string slicing O(1) in Go?"
  - "What would break with Unicode input?"

