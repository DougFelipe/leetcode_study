complexity:
  time: "O(n)"
  space: "O(1)"

text:
  rationale_md: |
    # Rationale

    Java uses int[26] for frequency tracking. charAt() and char arithmetic
    give the index. Math.max for maxFreq updates.

    Key advantages in Java:
    - int[26] for constant-space frequency
    - charAt(i) - 'A' for direct indexing
    - Math.max for clean comparison

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `s = "ABAB"`, `k = 2`:

    1. All characters can be replaced to match
    2. Window grows to full length 4
    3. maxFreq reaches 2 (either A or B)
    4. windowSize - maxFreq = 4 - 2 = 2 = k → valid
    5. Return 4

pitfalls:
  - "charAt returns char, arithmetic with 'A' gives int"
  - "int[26] auto-initialized to 0"
  - "s.length() not s.length"

tradeoffs:
  - "int[] is faster than HashMap for fixed alphabet"
  - "No autoboxing overhead"
  - "Direct array access is O(1)"

comparison_notes:
  highlights:
    - "int[26] for frequency"
    - "charAt(i) - 'A' for index"
    - "Math.max for maxFreq"
  gotchas_language_specific:
    - "s.length() is a method, not a field"
    - "char arithmetic produces int"
    - "Array auto-initialized to 0 in Java"

review_questions:
  - "Why use int[26] instead of HashMap?"
  - "What type does charAt() return?"
  - "Why is this approach O(n) and not O(26n)?"

