content:
  statement_md: |
    Given a **1-indexed** array of integers `numbers` that is already **sorted in non-decreasing order**,
    find two numbers such that they add up to a specific `target` number.
    Let these two numbers be `numbers[index1]` and `numbers[index2]` where
    `1 <= index1 < index2 <= numbers.length`.

    Return the indices of the two numbers, `index1` and `index2`, added by one
    as an integer array `[index1, index2]` of length 2.

    The tests are generated such that there is **exactly one solution**.
    You **may not** use the same element twice.

    Your solution must use only **constant extra space**.

    **Example 1:**
    ```
    Input: numbers = [2,7,11,15], target = 9
    Output: [1,2]
    Explanation: The sum of 2 and 7 is 9. Therefore, index1 = 1, index2 = 2. We return [1, 2].
    ```

    **Example 2:**
    ```
    Input: numbers = [2,3,4], target = 6
    Output: [1,3]
    Explanation: The sum of 2 and 4 is 6. Therefore index1 = 1, index2 = 3. We return [1, 3].
    ```

    **Example 3:**
    ```
    Input: numbers = [-1,0], target = -1
    Output: [1,2]
    Explanation: The sum of -1 and 0 is -1. Therefore index1 = 1, index2 = 2. We return [1, 2].
    ```

  editorial_summary_md: |
    Since the array is sorted, we use two pointers starting at opposite ends.
    If the sum is too small, move the left pointer right. If too large, move the right pointer left.
    This guarantees finding the unique solution in O(n) time with O(1) space.

  key_insights:
    - "Sorted array enables two-pointer technique from opposite ends"
    - "Sum too small → move left pointer right (increase sum)"
    - "Sum too large → move right pointer left (decrease sum)"
    - "Return 1-indexed result (add 1 to both indices)"

  pitfalls:
    - "Return 1-indexed, not 0-indexed indices"
    - "Don't use hash map — the problem requires O(1) space"
    - "Exactly one solution guaranteed, so the pointers always converge"

  review_questions:
    - "Why can we guarantee finding the solution with two pointers?"
    - "How does this differ from the original Two Sum problem?"
    - "Could we also use binary search? What would the complexity be?"

  editorial:
    algorithm_blueprint:
      compact_md: "Left = 0, Right = n-1 → Check sum → Move pointer based on comparison → Return 1-indexed"
      mermaid:
        type: "flowchart"
        direction: "TD"
        code: |
          flowchart TD
            A[Start] --> B[left=0, right=n-1]
            B --> C{left < right?}
            C -- Yes --> D["sum = numbers[left] + numbers[right]"]
            D --> E{sum == target?}
            E -- Yes --> F["Return [left+1, right+1]"]
            E -- No --> G{sum < target?}
            G -- Yes --> H[left++]
            G -- No --> I[right--]
            H --> C
            I --> C
            C -- No --> J[Should not reach here]

    alternative_approaches:
      - name: "Binary Search"
        idea_md: "For each element, binary search for its complement (target - element)."
        time: "O(n log n)"
        space: "O(1)"
        preserve_indices: true
        when_to_use_md: "When you want to practice binary search; slightly slower but still valid."
        why_not_md: "Two pointers is simpler and faster at O(n)."
        pitfalls:
          - "Must avoid using the same element twice"
          - "Binary search boundaries need care"

      - name: "Hash Map (Two Sum I approach)"
        idea_md: "Store seen values in a hash map, look up complement."
        time: "O(n)"
        space: "O(n)"
        preserve_indices: true
        when_to_use_md: "When the array is NOT sorted."
        why_not_md: "Violates the O(1) space constraint; doesn't leverage sorted property."
        pitfalls:
          - "Violates constant space requirement"
          - "Ignores the sorted property"

    when_not_to_use:
      heuristics_md: |
        The two-pointer approach is ideal for sorted arrays with a target sum.
        Consider alternatives when:
        - Array is not sorted (use hash map)
        - Multiple pairs needed (may need to collect all, not just stop at first)
      scenarios:
        - scenario: "Array is not sorted"
          why_md: "Two pointers require sorted input to work correctly."
          recommended_instead:
            - name: "Hash Map"
              note_md: "Classic Two Sum approach for unsorted arrays"

    common_mistakes:
      - mistake: "Returning 0-indexed results"
        why_md: "The problem uses 1-indexed arrays; indices must be incremented by 1."
        fix_md: "Return [left + 1, right + 1] instead of [left, right]."
        example_bad_md: |
          ```python
          return [left, right]  # 0-indexed!
          ```
        example_good_md: |
          ```python
          return [left + 1, right + 1]  # 1-indexed as required
          ```
        tags:
          - "off-by-one"
          - "1-indexed"

      - mistake: "Using a hash map"
        why_md: "The problem explicitly requires constant extra space."
        fix_md: "Use the two-pointer technique instead."
        tags:
          - "constraint-violation"
          - "space"

    complexity_notes:
      compact_md: "Time: O(n), Space: O(1)"
      detailed_md: |
        ## Time Complexity: O(n)
        - Each pointer moves at most n-1 times
        - Total pointer movements ≤ n - 1
        - Each step is O(1)

        ## Space Complexity: O(1)
        - Only two pointer variables used
        - Satisfies the constant space requirement
      notes:
        - "This is strictly better than binary search O(n log n)"
        - "Guaranteed to find the solution since exactly one exists"
      gotchas:
        - "O(1) space is a hard requirement, not just a preference"
        - "The sorted property is key to correctness"
      references:
        - label: "Two Pointers Technique"
          url: "https://leetcode.com/problems/two-sum-ii-input-array-is-sorted/editorial/"

