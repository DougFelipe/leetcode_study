approach:
  name: "Two Pointers on Sorted Array"
  tags:
    - "two-pointers"
    - "sorted-array"
    - "strict-equality"

complexity:
  time: "O(n)"
  space: "O(1)"

text:
  rationale_md: |
    # Rationale

    JavaScript's array literal [a, b] provides clean return syntax.
    Strict equality (===) ensures correct comparison.

    Key advantages in JavaScript:
    - Array literal for return: [left + 1, right + 1]
    - === for strict equality
    - No numeric sort needed (already sorted)

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `numbers = [2,7,11,15]`, `target = 9`:

    1. left=0, right=3 → sum=17 > 9 → right--
    2. left=0, right=2 → sum=13 > 9 → right--
    3. left=0, right=1 → sum=9 === target → return [1, 2]

pitfalls:
  - "Use === not == for comparison"
  - "[left + 1, right + 1] for 1-indexed"
  - "numbers.length is a property, not method"

tradeoffs:
  - "Array literal is concise for return"
  - "No sorting needed (input already sorted)"
  - "Simplest of all two-pointer problems"

comparison_notes:
  highlights:
    - "[a, b] array literal for return"
    - "=== strict equality"
    - "const for immutable sum"
  gotchas_language_specific:
    - "=== vs == (strict vs loose)"
    - ".length is property (no parentheses)"
    - "let vs const for variable bindings"

review_questions:
  - "Why is === preferred over == here?"
  - "Could we accidentally sort this array?"
  - "What would happen with duplicate numbers?"

