approach:
  name: "Prefix Sum + First Occurrence HashMap"
  tags: ["prefix-sum", "first-occurrence", "hashmap", "ownership"]

complexity:
  time: "O(n)"
  space: "O(n)"

text:
  rationale_md: |
    # Rationale

    Rust HashMap with `if let Some` for existence check. `insert(0, -1)` for init.
    Only insert when key not present. i32 for prefix (can go negative to -n).
    `i as i32` cast for index arithmetic.

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `nums = [0,1]`:
    1. map={0:-1}. i=0 (0): prefix=-1, get → None → insert(-1, 0)
    2. i=1 (1): prefix=0, get → Some(-1) → len=1-(-1)=2 → max_len=2
    3. Return 2

pitfalls:
  - "if let Some for existence without double lookup"
  - "else branch inserts only when absent"
  - "i as i32 for index cast"

tradeoffs:
  - "if let Some avoids double lookup"
  - "i32 safe for prefix since |prefix| <= n <= 10^5"
  - "Rust HashMap entry API not needed here"

comparison_notes:
  highlights:
    - "first_seen.insert(0, -1)"
    - "if let Some(&first_idx)"
    - "i as i32 cast"
  gotchas_language_specific:
    - "if let Some patterns match and bind"
    - "else branch for insert"
    - "i32 can hold -(10^5)"

review_questions:
  - "How does if let Some avoid double lookup?"
  - "When would you use entry().or_insert() instead?"
  - "Can prefix underflow i32 for n=10^5?"

