approach:
  name: "Iterative Digit-by-Digit Addition"
  tags:
    - "linked-list"
    - "carry-handling"
    - "pointer-manipulation"

complexity:
  time: "O(max(m, n))"
  space: "O(max(m, n))"

text:
  rationale_md: |
    # Rationale

    Go's explicit pointer semantics make linked list operations clear.
    The struct literal syntax allows inline node creation.

    Key advantages in Go:
    - Explicit nil checks for safety
    - Integer division is default for int types
    - Pointer receiver pattern for struct methods

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `l1 = [2,4,3]` and `l2 = [5,6,4]`:

    1. **Loop 1**: l1.Val=2, l2.Val=5, carry=0
       - sum = 7, carry = 0
       - Append node with Val 7

    2. **Loop 2**: l1.Val=4, l2.Val=6, carry=0
       - sum = 10, carry = 1
       - Append node with Val 0

    3. **Loop 3**: l1.Val=3, l2.Val=4, carry=1
       - sum = 8, carry = 0
       - Append node with Val 8

    Result: 7 → 0 → 8

pitfalls:
  - "Check for nil before accessing Val or Next"
  - "Advance pointers inside the loop"
  - "Include carry != 0 in loop condition"

tradeoffs:
  - "Explicit nil checks vs. implicit in other languages"
  - "No ternary operator, use if statements"
  - "Struct literals are concise for node creation"

comparison_notes:
  highlights:
    - "&ListNode{Val: x} for inline struct creation"
    - "Explicit nil checks before pointer access"
    - "Integer division is automatic for int types"
  gotchas_language_specific:
    - "nil != null (Go uses nil for zero pointer)"
    - "No ternary operator in Go"
    - "Val and Next are exported (capitalized)"

review_questions:
  - "Why use a dummy head node in Go?"
  - "What's the difference between *ListNode and ListNode?"
  - "Why advance l1 and l2 inside the loop?"

