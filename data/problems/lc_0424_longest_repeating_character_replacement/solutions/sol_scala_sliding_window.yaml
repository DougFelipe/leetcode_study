approach:
  name: "Sliding Window with Array"
  tags:
    - "sliding-window"
    - "array"
    - "imperative-functional"

complexity:
  time: "O(n)"
  space: "O(1)"

text:
  rationale_md: |
    # Rationale

    Scala uses Array[Int](26) for frequency tracking with imperative
    sliding window. math.max for clean maxFreq updates. Char arithmetic
    works naturally in Scala.

    Key advantages in Scala:
    - new Array[Int](26) initialized to 0
    - s(i) for character access
    - math.max for comparison

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `s = "ABAB"`, `k = 2`:

    1. Array of 26 zeros
    2. s.indices iterates 0..3
    3. All positions valid since windowSize - maxFreq = 4 - 2 = 2 = k
    4. Return s.length - left = 4 - 0 = 4

pitfalls:
  - "new Array[Int](26) auto-initializes to 0"
  - "s(i) accesses char at index i"
  - "Char subtraction yields Int in Scala"

tradeoffs:
  - "Mutable vars for imperative approach"
  - "Could be made tail-recursive but harder to read"
  - "Array is more efficient than Map for fixed alphabet"

comparison_notes:
  highlights:
    - "Array[Int](26) for frequency"
    - "s(i) - 'A' for index"
    - "math.max for maxFreq"
  gotchas_language_specific:
    - "s(i) uses apply method"
    - "Char arithmetic returns Int"
    - "var needed for mutable state"

review_questions:
  - "Could this be implemented with tail recursion?"
  - "What does s(i) desugar to?"
  - "Why use var instead of val here?"

