approach:
  name: "Prefix Sum with foldLeft"
  tags: ["prefix-sum", "foldleft", "immutable-map", "functional"]

complexity:
  time: "O(n)"
  space: "O(n)"

text:
  rationale_md: |
    Scala's foldLeft accumulates a tuple `(prefix, count, map)` over the array.
    Uses immutable Map with `updated` and `getOrElse`. Fully functional,
    side-effect-free implementation.

  walkthrough_md: |
    nums=[1,2,3], k=3:
    State starts (0,0,Map(0->1)). num=1→prefix=1, found=0, state=(1,0,{0:1,1:1}).
    num=2→prefix=3, found=1→count=1. num=3→prefix=6, found=1→count=2. Return 2.

pitfalls:
  - "foldLeft state is (prefix, count, map) tuple"
  - "Map.updated is immutable — creates new map"
  - "Pattern match result to extract count"

tradeoffs:
  - "Fully functional — no mutable state"
  - "Map.updated has O(log n) cost"

comparison_notes:
  highlights: ["foldLeft tuple state", "Map.updated", "pattern match on result"]
  gotchas_language_specific: ["Map.updated vs mutable +=", "foldLeft is left-associative"]

review_questions:
  - "What is the cost of Map.updated vs mutable Map?"
  - "Could this be simplified with mutable state?"

