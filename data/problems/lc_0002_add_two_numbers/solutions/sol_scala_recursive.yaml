text:
  rationale_md: |
    # Rationale

    Scala's functional style naturally fits recursive solutions.
    The recursive approach elegantly handles carry propagation.

    Key advantages in Scala:
    - Recursion is idiomatic
    - Pattern matching for null checks
    - Expression-oriented (everything returns a value)

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `l1 = [2,4,3]` and `l2 = [5,6,4]`:

    1. add(l1, l2, 0) - first call with carry=0
    2. x=2, y=5, sum=7, carry=0
    3. Create node(7), next = add(l1.next, l2.next, 0)
    4. Recurse: x=4, y=6, sum=10, carry=1
    5. Create node(0), next = add(l1.next, l2.next, 1)
    6. Recurse: x=3, y=4+1=8, carry=0
    7. Create node(8), next = add(null, null, 0) = null
    8. Unwinding returns: 7 → 0 → 8

pitfalls:
  - "Base case must check all three: n1==null, n2==null, carry==0"
  - "Recursion adds stack frames"
  - "Not tail-recursive due to node.next assignment after recursive call"

tradeoffs:
  - "Elegant but uses more stack space"
  - "Not tail-recursive (can't be optimized by compiler)"
  - "More idiomatic Scala but less efficient for very long lists"

comparison_notes:
  highlights:
    - "Nested function for clean interface"
    - "Expression-oriented: every if returns a value"
    - "null checks are explicit (Scala 2 style)"
  gotchas_language_specific:
    - "Not tail-recursive due to post-recursive assignment"
    - "ListNode uses x instead of val (LeetCode Scala style)"
    - "null is still used in Scala for Java interop"

