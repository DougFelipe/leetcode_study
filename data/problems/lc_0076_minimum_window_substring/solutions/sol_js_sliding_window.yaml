complexity:
  time: "O(m + n)"
  space: "O(m + n)"

text:
  rationale_md: |
    # Rationale

    JavaScript's ES6 Map provides clean key-value storage with .get(), .set(),
    and .has() methods. Infinity serves as initial minimum length sentinel.

    Key advantages in JavaScript:
    - ES6 Map for frequency tracking
    - .get(c) || 0 for safe default
    - Infinity for initial comparison
    - === for strict equality

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `s = "ADOBECODEBANC"`, `t = "ABC"`:

    1. Build need Map: {A=>1, B=>1, C=>1}
    2. Expand right, track window Map
    3. When have === required (3), shrink left
    4. Track minLen and minStart
    5. Return s.substring(minStart, minStart + minLen) = "BANC"

pitfalls:
  - "Map.get(c) returns undefined for missing keys, not 0"
  - "Use || 0 pattern for safe default"
  - "=== for strict comparison with Infinity"

tradeoffs:
  - "Map is cleaner than plain object for frequency tracking"
  - "ES6 Map preserves insertion order"
  - "substring vs slice: both work here"

comparison_notes:
  highlights:
    - "new Map() for frequency maps"
    - ".get(c) || 0 for safe default"
    - "Infinity sentinel"
  gotchas_language_specific:
    - "Map.get returns undefined, not 0"
    - "=== checks both value and type"
    - "s.substring(start, end) is exclusive end"

review_questions:
  - "Why use Map instead of a plain object?"
  - "What happens if we use == instead of === with Infinity?"
  - "How does || 0 work as a default value pattern?"

