text:
  rationale_md: |
    # Rationale

    Python's str.isalnum() and str.lower() methods make character filtering clean.
    Two pointers skip non-alphanumeric and compare lowercase in-place.

    Key advantages in Python:
    - .isalnum() for alphanumeric check
    - .lower() for case-insensitive comparison
    - Clean while loops for skipping

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `s = "A man, a plan, a canal: Panama"`:

    1. left=0('A'), right=29('a') → both alnum → 'a'=='a' ✓
    2. left=1(' '), skip → left=2('m'); right=28('m') → 'm'=='m' ✓
    3. Continue matching: a,n,a,p,l,a,n,a,c,a,n,a,l,p...
    4. Pointers converge → return True

pitfalls:
  - ".isalnum() includes digits, not just letters"
  - ".lower() returns new string for each char"
  - "Double while loop guard: left < right in inner loops too"

tradeoffs:
  - "O(1) space vs filter+reverse O(n) space"
  - "Slightly more complex code but memory efficient"
  - "isalnum handles digits automatically"

comparison_notes:
  highlights:
    - ".isalnum() for alphanumeric check"
    - ".lower() for case conversion"
    - "Nested while loops for skip logic"
  gotchas_language_specific:
    - ".isalnum() returns False for empty string"
    - ".lower() creates new string object"
    - "Must check left < right in inner while loops"

review_questions:
  - "Why check left < right in the inner while loops?"
  - "What characters does isalnum() accept?"
  - "How does this compare to the filter+reverse approach?"

