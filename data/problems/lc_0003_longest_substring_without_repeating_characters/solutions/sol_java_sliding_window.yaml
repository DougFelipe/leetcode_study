approach:
  name: "Sliding Window with HashSet"
  tags:
    - "sliding-window"
    - "hash-set"
    - "oop"

complexity:
  time: "O(n)"
  space: "O(min(n, m))"

text:
  rationale_md: |
    # Rationale

    Java's HashSet provides O(1) operations for the sliding window.
    charAt() method accesses individual characters by index.

    Key advantages in Java:
    - Strong typing with generics (Set<Character>)
    - HashSet for O(1) operations
    - Math.max() for clean comparison

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `s = "abcabcbb"`:

    1. Initialize charSet = {}, left = 0, maxLen = 0
    2. right=0: 'a' not in set → add, maxLen = 1
    3. right=1: 'b' not in set → add, maxLen = 2
    4. right=2: 'c' not in set → add, maxLen = 3
    5. right=3: 'a' in set → remove s[0]='a', left=1 → add 'a', maxLen = 3
    6. Continue sliding... final answer = 3

pitfalls:
  - "Use s.charAt(right) not s[right] (Java strings)"
  - "HashSet.contains() for membership check"
  - "Auto-boxing char to Character for Set<Character>"

tradeoffs:
  - "HashSet is more verbose than Python's set but type-safe"
  - "charAt() has O(1) access time"
  - "Could use int[128] array instead of HashSet for ASCII"

comparison_notes:
  highlights:
    - "Set<Character> with auto-boxing"
    - "Math.max() for max comparison"
    - "charAt() for character access"
  gotchas_language_specific:
    - "char auto-boxes to Character for HashSet"
    - "s.length() is a method call, not a property"
    - "int division is automatic in Java"

review_questions:
  - "Why use HashSet instead of an int array for ASCII?"
  - "What is the difference between remove() returning boolean vs void?"
  - "How does auto-boxing affect performance here?"

