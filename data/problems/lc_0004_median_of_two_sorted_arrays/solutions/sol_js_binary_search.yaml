approach:
  name: "Binary Search Partition"
  tags:
    - "binary-search"
    - "partition"
    - "infinity"

complexity:
  time: "O(log(min(m, n)))"
  space: "O(1)"

text:
  rationale_md: |
    # Rationale

    JavaScript's -Infinity and Infinity serve as natural sentinel values.
    Destructuring assignment enables clean array swap.

    Key advantages in JavaScript:
    - -Infinity / Infinity built-in globals
    - Destructuring swap: [nums1, nums2] = [nums2, nums1]
    - Math.max() / Math.min() for comparisons

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `nums1 = [1,3]`, `nums2 = [2]`:

    1. nums1.length(2) > nums2.length(1) → swap via destructuring
    2. nums1=[2], nums2=[1,3], m=1, n=2
    3. partition1=0, partition2=2
       - maxLeft1=-Infinity, minRight1=2, maxLeft2=3, minRight2=Infinity
       - maxLeft2(3) > minRight1(2) → lo = 1
    4. partition1=1, partition2=1
       - maxLeft1=2, minRight1=Infinity, maxLeft2=1, minRight2=3
       - Valid! Total odd → Math.max(2, 1) = 2

pitfalls:
  - "Use Math.floor() for integer division"
  - "-Infinity and Infinity are globals, not Math properties"
  - "=== for strict equality in modulo check"

tradeoffs:
  - "Destructuring swap is elegant but creates temporary array"
  - "-Infinity / Infinity handle edge cases naturally"
  - "Math.floor needed since JS division returns float"

comparison_notes:
  highlights:
    - "Destructuring swap: [a, b] = [b, a]"
    - "-Infinity / Infinity as sentinels"
    - "Math.floor() for integer division"
  gotchas_language_specific:
    - "JS division always returns float (need Math.floor)"
    - "-Infinity !== Number.NEGATIVE_INFINITY (both work)"
    - "=== for strict comparison"

review_questions:
  - "Why do we need Math.floor for partition calculation?"
  - "How does JavaScript handle -Infinity in comparisons?"
  - "What's the difference between -Infinity and Number.NEGATIVE_INFINITY?"

