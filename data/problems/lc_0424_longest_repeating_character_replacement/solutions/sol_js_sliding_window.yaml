approach:
  name: "Sliding Window with Array"
  tags:
    - "sliding-window"
    - "array"
    - "charcodeat"

complexity:
  time: "O(n)"
  space: "O(1)"

text:
  rationale_md: |
    # Rationale

    JavaScript uses Array(26).fill(0) for frequency tracking.
    charCodeAt() converts characters to numeric indices. Math.max
    for maxFreq updates.

    Key advantages in JavaScript:
    - Array(26).fill(0) for initialized array
    - charCodeAt(i) - 65 for index ('A' = 65)
    - Math.max for clean comparison

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `s = "AABABBA"`, `k = 1`:

    1. freq = Array(26).fill(0)
    2. Expand right, update freq and maxFreq
    3. When invalid, slide left by 1
    4. Return s.length - left = 4

pitfalls:
  - "charCodeAt returns Unicode code point"
  - "'A' is 65, not 'A'.charCodeAt(0) needed"
  - "Array(26).fill(0) initializes all to 0"

tradeoffs:
  - "Array is faster than Map for fixed alphabet"
  - "charCodeAt is slightly verbose"
  - "Math.max is safe with numbers"

comparison_notes:
  highlights:
    - "Array(26).fill(0) for frequency"
    - "charCodeAt(i) - 65 for index"
    - "Math.max for maxFreq"
  gotchas_language_specific:
    - "new Array(26) creates sparse array, use .fill(0)"
    - "charCodeAt returns number, not string"
    - "=== for strict equality"

review_questions:
  - "Why fill(0) instead of just Array(26)?"
  - "What does charCodeAt return for 'A'?"
  - "Could we use a Map instead? What's the tradeoff?"

