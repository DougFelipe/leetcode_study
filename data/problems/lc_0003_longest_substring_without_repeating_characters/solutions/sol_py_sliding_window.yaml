approach:
  name: "Sliding Window with Hash Set"
  tags:
    - "sliding-window"
    - "hash-set"
    - "two-pointers"

complexity:
  time: "O(n)"
  space: "O(min(n, m))"

text:
  rationale_md: |
    # Rationale

    Python's set provides O(1) add/remove/lookup, making it ideal for the sliding window.
    The approach maintains a window [left, right] of unique characters.

    Key advantages in Python:
    - Built-in set with clean syntax
    - `in` operator for membership testing
    - `max()` built-in for updating result

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `s = "abcabcbb"`:

    1. **right=0**: char='a', set={}, add 'a' → set={'a'}, maxLen=1
    2. **right=1**: char='b', set={'a'}, add 'b' → set={'a','b'}, maxLen=2
    3. **right=2**: char='c', set={'a','b'}, add 'c' → set={'a','b','c'}, maxLen=3
    4. **right=3**: char='a', 'a' in set! Remove s[0]='a' → left=1, set={'b','c'}
       - add 'a' → set={'b','c','a'}, maxLen=3
    5. **right=4**: char='b', 'b' in set! Remove s[1]='b' → left=2, set={'c','a'}
       - add 'b' → set={'c','a','b'}, maxLen=3
    6. Continue... maxLen stays 3

    Final answer: 3

pitfalls:
  - "Shrink window with while loop, not if statement"
  - "Use set.remove() not set.discard() to catch logic errors"
  - "Update maxLen after adding the new character"

tradeoffs:
  - "Hash set uses O(min(n, m)) space but gives O(1) lookups"
  - "Inner while loop may seem O(n²) but total operations are O(2n)"
  - "Could use hash map for index-based optimization"

comparison_notes:
  highlights:
    - "set() for O(1) membership testing"
    - "in operator for clean readability"
    - "range(len(s)) for index-based iteration"
  gotchas_language_specific:
    - "set.remove() raises KeyError if element not found"
    - "Strings are iterable but we use index-based access here"
    - "max() with two args is cleaner than if-else"

review_questions:
  - "Why is the time complexity O(n) despite the nested while loop?"
  - "What happens with an empty string input?"
  - "How would you optimize using a hash map instead of a set?"

