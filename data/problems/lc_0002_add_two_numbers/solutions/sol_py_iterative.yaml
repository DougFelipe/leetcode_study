complexity:
  time: "O(max(m, n))"
  space: "O(max(m, n))"

text:
  rationale_md: |
    # Rationale

    Python's clean syntax makes linked list manipulation straightforward.
    We use a dummy head node to simplify edge cases when building the result list.

    Key advantages in Python:
    - Truthy/falsy evaluation for None checks
    - Integer division with // operator
    - Clean ternary expressions

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `l1 = [2,4,3]` and `l2 = [5,6,4]` (representing 342 and 465):

    1. **Iteration 1**: x=2, y=5, carry=0
       - sum = 2 + 5 + 0 = 7
       - new carry = 0, digit = 7
       - Result: 7

    2. **Iteration 2**: x=4, y=6, carry=0
       - sum = 4 + 6 + 0 = 10
       - new carry = 1, digit = 0
       - Result: 7 → 0

    3. **Iteration 3**: x=3, y=4, carry=1
       - sum = 3 + 4 + 1 = 8
       - new carry = 0, digit = 8
       - Result: 7 → 0 → 8

    Final: [7, 0, 8] representing 807 (342 + 465 = 807)

pitfalls:
  - "Don't forget to handle carry after both lists are exhausted"
  - "Use 0 when a list has ended but the other continues"
  - "Remember to include carry > 0 in the while condition"

tradeoffs:
  - "Dummy head simplifies code but uses extra node"
  - "Iterative is more memory-efficient than recursive for very long lists"
  - "Building result as we go vs. collecting digits first"

comparison_notes:
  highlights:
    - "Truthy evaluation: 'if l1' instead of 'if l1 is not None'"
    - "Integer division: // for carry calculation"
    - "Optional type hint shows nullable parameter"
  gotchas_language_specific:
    - "None is falsy in Python"
    - "// is integer division, / is float division"
    - "ListNode must be defined or imported"

review_questions:
  - "Why do we include carry > 0 in the while condition?"
  - "What happens if l1 = [9,9,9] and l2 = [1]?"
  - "Why use a dummy head node?"

