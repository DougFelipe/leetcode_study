complexity:
  time: "O(n)"
  space: "O(1)"

text:
  rationale_md: |
    # Rationale

    Kotlin's when expression provides elegant three-way branching.
    intArrayOf() creates the return array cleanly.

    Key advantages in Kotlin:
    - when expression for clean branching
    - intArrayOf() for array creation
    - Return from when branch directly

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `numbers = [2,7,11,15]`, `target = 9`:

    1. left=0, right=3 → sum=17 > 9 → right--
    2. left=0, right=2 → sum=13 > 9 → right--
    3. left=0, right=1 → sum=9 == target → return intArrayOf(1, 2)

pitfalls:
  - "intArrayOf(left+1, right+1) for 1-indexed"
  - "when with return exits the function"
  - "numbers.size not numbers.length"

tradeoffs:
  - "when is cleaner than if-else chain"
  - "intArrayOf avoids boxing (primitive array)"
  - "Direct return from when branch"

comparison_notes:
  highlights:
    - "when expression with return"
    - "intArrayOf() for primitive int array"
    - "numbers.size for array length"
  gotchas_language_specific:
    - ".size not .length for IntArray"
    - "intArrayOf vs arrayOf (primitive vs boxed)"
    - "when must have else for non-exhaustive"

review_questions:
  - "Why use intArrayOf instead of arrayOf?"
  - "How does return inside when work?"
  - "What happens if numbers.size is 0?"

