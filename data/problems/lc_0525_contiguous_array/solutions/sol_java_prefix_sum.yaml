approach:
  name: "Prefix Sum + First Occurrence HashMap"
  tags: ["prefix-sum", "first-occurrence", "hashmap", "oop"]

complexity:
  time: "O(n)"
  space: "O(n)"

text:
  rationale_md: |
    # Rationale

    Java HashMap with containsKey to avoid overwriting first occurrences.
    `put(0, -1)` for initialization. `Math.max` for length comparison.
    Ternary for the 0→-1 transform.

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `nums = [0,1]`:
    1. map={0:-1}. i=0 (0): prefix=-1, not in map → map[-1]=0
    2. i=1 (1): prefix=0, in map at -1 → maxLen=max(0,1-(-1))=2
    3. Return 2

pitfalls:
  - "containsKey to avoid overwriting"
  - "put(0,-1) not put(0,0)"
  - "Ternary for 0→-1 transform"

tradeoffs:
  - "containsKey + get is two lookups — could use getOrDefault with sentinel"
  - "Integer auto-unboxing for comparison"

comparison_notes:
  highlights:
    - "firstSeen.put(0, -1)"
    - "containsKey before put"
    - "nums[i] == 1 ? 1 : -1"
  gotchas_language_specific:
    - "containsKey check prevents overwrite"
    - "Integer unboxing for max comparison"
    - "No negative modulo concern here"

review_questions:
  - "Why use containsKey instead of getOrDefault?"
  - "What would happen if you always called put?"
  - "Is there an overflow risk for the prefix sum?"

