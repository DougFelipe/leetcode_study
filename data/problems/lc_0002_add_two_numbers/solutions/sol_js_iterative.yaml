text:
  rationale_md: |
    # Rationale

    JavaScript's dynamic typing and truthy/falsy evaluation make linked list code concise.
    The function constructor pattern is common in LeetCode JavaScript solutions.

    Key advantages in JavaScript:
    - Truthy/falsy for null checks
    - Math.floor for integer division
    - Ternary expressions for concise code

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `l1 = [2,4,3]` and `l2 = [5,6,4]`:

    1. Create dummy node with ListNode constructor
    2. While l1 !== null OR l2 !== null OR carry !== 0
    3. Use truthy check: l1 ? l1.val : 0
    4. Use Math.floor(sum / 10) for carry
    5. Create new node with sum % 10
    6. Advance pointers if truthy

pitfalls:
  - "Use !== null not != (type coercion issues)"
  - "Math.floor required for integer division"
  - "Check truthy before accessing .next"

tradeoffs:
  - "Concise but less type safety"
  - "Prototype pattern vs ES6 class"
  - "Dynamic typing can hide bugs"

comparison_notes:
  highlights:
    - "Truthy evaluation: l1 ? l1.val : 0"
    - "Math.floor for integer division"
    - "var vs let for function scope"
  gotchas_language_specific:
    - "null is falsy in JavaScript"
    - "/ returns float, need Math.floor"
    - "=== vs == (strict vs loose equality)"

review_questions:
  - "Why use !== null instead of just !== 0?"
  - "What happens if we use / instead of Math.floor?"
  - "How would you convert this to ES6 class syntax?"

