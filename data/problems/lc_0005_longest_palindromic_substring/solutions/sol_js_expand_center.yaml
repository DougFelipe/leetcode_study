approach:
  name: "Expand Around Center"
  tags:
    - "expand-around-center"
    - "two-pointers"
    - "closure"

complexity:
  time: "O(n²)"
  space: "O(1)"

text:
  rationale_md: |
    # Rationale

    JavaScript's closures naturally capture outer let/const variables.
    Inner function expand modifies outer `start` and `maxLen` variables.

    Key advantages in JavaScript:
    - Closures capture outer scope by reference
    - s[i] for character access (string bracket notation)
    - substring(start, end) for extraction

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `s = "cbbd"`:

    1. expand function defined inside, captures start and maxLen
    2. i=0: expand(0,0)→"c"; expand(0,1)→'c'!='b'
    3. i=1: expand(1,1)→"b"; expand(1,2)→'b'==='b' → "bb", maxLen=2
    4. i=2: expand(2,2)→"b"; expand(2,3)→'b'!=='d'
    5. i=3: expand(3,3)→"d"

    Result: s.substring(1, 3) = "bb"

pitfalls:
  - "Use === for strict equality comparison"
  - "substring(start, end) — end is exclusive"
  - "s[i] returns string of length 1, not char"

tradeoffs:
  - "Closure is natural in JS for shared state"
  - "Inner function vs separate function"
  - "s[i] returns string, compared with ==="

comparison_notes:
  highlights:
    - "Closure captures let variables by reference"
    - "=== for strict equality"
    - "substring(start, end) for extraction"
  gotchas_language_specific:
    - "s[i] returns string, not char type"
    - "=== vs == (strict vs loose equality)"
    - "substring vs slice (different edge behaviors)"

review_questions:
  - "What's the difference between substring() and slice()?"
  - "Why use === instead of == for character comparison?"
  - "How does JavaScript's closure capture differ from Python's?"

