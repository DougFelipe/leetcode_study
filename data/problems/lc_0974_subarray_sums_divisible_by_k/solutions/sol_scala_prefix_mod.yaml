approach:
  name: "Prefix Mod with foldLeft and Mutable Array"
  tags: ["prefix-sum", "modulo", "foldleft", "mutable-array"]

complexity:
  time: "O(n)"
  space: "O(k)"

text:
  rationale_md: |
    # Rationale

    Scala uses `foldLeft` accumulating `(prefix, count)` while mutating a
    shared `freq` array. This mixes functional iteration with an imperative
    array for efficiency. Scala `%` can return negative — normalization applied.

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `nums = [4,5,0,-2,-3,1]`, `k = 5`:

    1. freq=new Array[Int](5), freq(0)=1
    2. foldLeft processes each num, updates freq and count
    3. ._2 extracts count from final tuple
    4. Return 7

pitfalls:
  - "Scala % can return negative (JVM behavior)"
  - "Mutable freq shared in foldLeft closure"
  - "._2 to extract count from tuple"

tradeoffs:
  - "foldLeft is functional iteration"
  - "Mutable array is efficient"
  - "Hybrid functional/imperative style"

comparison_notes:
  highlights:
    - "foldLeft with (prefix, count) tuple"
    - "Mutable freq array shared via closure"
    - "._2 to extract result"
  gotchas_language_specific:
    - "Scala % follows JVM semantics"
    - "Array mutation inside foldLeft is valid"
    - "._2 extracts second tuple element"

review_questions:
  - "Is mutating freq inside foldLeft idiomatic Scala?"
  - "Could this be done with purely immutable data?"
  - "What does ._2 do?"

