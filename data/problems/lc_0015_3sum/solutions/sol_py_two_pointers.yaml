text:
  rationale_md: |
    # Rationale

    Python's list.sort() is in-place and efficient. The nested while loop
    with two pointers finds pairs that complement the fixed element.

    Key advantages in Python:
    - In-place sort with list.sort()
    - Clean list append for results
    - Continue statement for duplicate skipping

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `nums = [-1,0,1,2,-1,-4]`:

    1. Sort → [-4,-1,-1,0,1,2]
    2. **i=0** (nums[0]=-4): left=1, right=5
       - sum = -4+(-1)+2 = -3 < 0 → left++
       - sum = -4+(-1)+2 = -3 < 0 → left++
       - ... no triplet found
    3. **i=1** (nums[1]=-1): left=2, right=5
       - sum = -1+(-1)+2 = 0 → found! [-1,-1,2]
       - Skip dups, left=3, right=4
       - sum = -1+0+1 = 0 → found! [-1,0,1]
    4. **i=2** (nums[2]=-1): duplicate of i=1, skip

    Result: [[-1,-1,2], [-1,0,1]]

pitfalls:
  - "nums.sort() modifies in-place; sorted() creates new list"
  - "Skip duplicates with continue, not break"
  - "Move both pointers after finding valid triplet"

tradeoffs:
  - "In-place sort modifies input array"
  - "Duplicate skip logic adds complexity but ensures uniqueness"
  - "O(n²) is optimal for this problem"

comparison_notes:
  highlights:
