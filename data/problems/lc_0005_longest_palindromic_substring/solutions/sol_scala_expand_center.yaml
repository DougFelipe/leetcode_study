approach:
  name: "Recursive Expand Around Center"
  tags:
    - "expand-around-center"
    - "recursion"
    - "functional"

complexity:
  time: "O(n²)"
  space: "O(n)"

text:
  rationale_md: |
    # Rationale

    Scala expresses the expansion as a recursive function, which is idiomatic.
    The mutable var variables track the best palindrome found.

    Key advantages in Scala:
    - Recursive expand is naturally functional
    - s(i) for character access via apply
    - s.substring(start, end) for extraction

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `s = "babad"`:

    1. Recursive expand function checks bounds and char equality
    2. If valid, updates start/maxLen and recurses with expanded bounds
    3. Base case: out of bounds or characters don't match
    4. For each i: expand(i, i) and expand(i, i+1)

    Result: s.substring(0, 3) = "bab"

pitfalls:
  - "Recursive approach adds stack frames (O(n) space)"
  - "s(i) uses apply method for character access"
  - "Mutable var for tracking state in functional style"

tradeoffs:
  - "Recursion is idiomatic but uses stack space"
  - "Mutable variables needed for tracking state"
  - "Could use pure functional return values instead"

comparison_notes:
  highlights:
    - "Recursive expansion (functional style)"
    - "s(i) via apply method"
    - "s.substring(start, end) for extraction"
  gotchas_language_specific:
    - "Recursive calls add stack frames"
    - "s(i) is sugar for s.apply(i)"
    - "Unit return type for side-effecting expand"

review_questions:
  - "Is this expand function tail-recursive?"
  - "How would you make a purely functional version?"
  - "What's the stack depth in the worst case?"

