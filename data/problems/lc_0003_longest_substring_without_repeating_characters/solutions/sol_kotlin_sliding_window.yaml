approach:
  name: "Sliding Window with MutableSet"
  tags:
    - "sliding-window"
    - "hash-set"
    - "kotlin-idioms"

complexity:
  time: "O(n)"
  space: "O(min(n, m))"

text:
  rationale_md: |
    # Rationale

    Kotlin's mutableSetOf() and maxOf() provide clean, idiomatic code.
    The `in` operator checks set membership expressively.

    Key advantages in Kotlin:
    - mutableSetOf<Char>() for concise set creation
    - `in` operator for membership check
    - maxOf() top-level function

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `s = "abcabcbb"`:

    1. charSet = mutableSetOf(), left=0, maxLen=0
    2. right=0: 'a' not in set → add, maxLen=1
    3. right=1: 'b' not in set → add, maxLen=2
    4. right=2: 'c' not in set → add, maxLen=3
    5. right=3: 'a' in set → remove s[0]='a', left=1 → add 'a', maxLen=3
    6. Continue sliding... final answer = 3

pitfalls:
  - "Use s.indices instead of 0 until s.length for range"
  - "s[i] returns Char directly in Kotlin"
  - "maxOf() is a top-level function, not a method"

tradeoffs:
  - "More concise than Java while maintaining type safety"
  - "mutableSetOf creates a LinkedHashSet by default"
  - "Kotlin's `in` is syntactic sugar for contains()"

comparison_notes:
  highlights:
    - "s.indices for idiomatic range iteration"
    - "`in` operator as contains() sugar"
    - "maxOf() top-level function"
  gotchas_language_specific:
    - "s[i] in Kotlin returns Char (operator overload)"
    - "mutableSetOf() vs hashSetOf() (LinkedHashSet vs HashSet)"
    - "var vs val for mutable/immutable variables"

review_questions:
