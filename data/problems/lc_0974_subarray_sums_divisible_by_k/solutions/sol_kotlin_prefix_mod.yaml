approach:
  name: "Prefix Mod + IntArray with Normalization"
  tags: ["prefix-sum", "modulo", "intarray", "normalization"]

complexity:
  time: "O(n)"
  space: "O(k)"

text:
  rationale_md: |
    # Rationale

    Kotlin's `%` follows Java semantics — negative for negative dividends.
    IntArray(k) for primitive int array. Normalization applied inline.

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `nums = [4,5,0,-2,-3,1]`, `k = 5`:

    1. freq=IntArray(5), freq[0]=1
    2. Process each num with normalization
    3. Count pairs with same remainder
    4. Return 7

pitfalls:
  - "Kotlin % same as Java — can be negative"
  - "IntArray(k) is primitive, not boxed"
  - "Normalization: ((x % k) + k) % k"

tradeoffs:
  - "IntArray avoids boxing"
  - "for (num in nums) is clean"
  - "maxOf not needed here"

comparison_notes:
  highlights:
    - "IntArray(k) for freq"
    - "((prefix + num) % k + k) % k"
    - "for (num in nums)"
  gotchas_language_specific:
    - "Kotlin % inherits JVM behavior"
    - "IntArray vs Array<Int>"
    - "nums is IntArray in LeetCode"

review_questions:
  - "Does Kotlin % behave like Java or Python?"
  - "Why IntArray instead of Array<Int>?"
  - "How would you write this with a mutableMap?"

