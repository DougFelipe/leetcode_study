approach:
  name: "Prefix Sum + First Occurrence Map"
  tags: ["prefix-sum", "first-occurrence", "map"]

complexity:
  time: "O(n)"
  space: "O(n)"

text:
  rationale_md: |
    # Rationale

    Go's two-value map access `idx, ok := firstSeen[prefix]` cleanly checks
    existence and retrieves value in one step. Map literal `{0: -1}` for init.
    Explicit if for max comparison avoids float conversion.

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `nums = [0,1,0]`:
    1. map={0:-1}. i=0 (0): prefix=-1, ok=false → map[-1]=0
    2. i=1 (1): prefix=0, ok=true, idx=-1 → maxLen=1-(-1)=2
    3. i=2 (0): prefix=-1, ok=true, idx=0 → 2-0=2, no update
    4. Return 2

pitfalls:
  - "Two-value assignment for map existence check"
  - "map[int]int{0: -1} for init"
  - "Only update maxLen if i-idx > maxLen"

tradeoffs:
  - "Two-value map access is idiomatic Go"
  - "No math.Max needed — explicit if"
  - "Explicit if/else for 0→-1 transform"

comparison_notes:
  highlights:
    - "idx, ok := firstSeen[prefix]"
    - "map[int]int{0: -1}"
    - "if i-idx > maxLen"
  gotchas_language_specific:
    - "Two-value map access is O(1)"
    - "Go map returns false ok for missing key"
    - "No negative modulo issue here"

review_questions:
  - "What does the two-value map access return for missing keys?"
  - "Why not use math.Max?"
  - "How does Go's map initialization syntax work?"

