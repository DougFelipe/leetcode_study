problem_id: "lc:974:subarray_sums_divisible_by_k"
language: "python"
paradigm: "imperative"

approach:
  name: "Prefix Mod + Frequency Array"
  tags: ["prefix-sum", "modulo", "array", "frequency"]

complexity:
  time: "O(n)"
  space: "O(k)"

text:
  rationale_md: |
    # Rationale

    Python's `%` always returns a non-negative result for positive divisors,
    so no normalization is needed. The frequency array of size k is more
    efficient than a dict. `prefix = (prefix + num) % k` keeps prefix in [0, k-1].

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `nums = [4,5,0,-2,-3,1]`, `k = 5`:

    1. freq=[1,0,0,0,0], prefix=0, count=0
    2. num=4: prefix=4, count+=freq[4]=0. freq[4]=1
    3. num=5: prefix=9%5=4, count+=freq[4]=1 → count=1. freq[4]=2
    4. num=0: prefix=4%5=4, count+=freq[4]=2 → count=3. freq[4]=3
    5. num=-2: prefix=2%5=2, count+=freq[2]=0. freq[2]=1
    6. num=-3: prefix=-1%5=4 (Python gives 4!), count+=freq[4]=3 → count=6. freq[4]=4
    7. num=1: prefix=5%5=0, count+=freq[0]=1 → count=7. freq[0]=2
    8. Return 7

pitfalls:
  - "Python % gives non-negative — no normalization needed"
  - "freq[0]=1 init is mandatory"
  - "Look up BEFORE incrementing"

tradeoffs:
  - "Array of size k is O(k) and faster than dict"
  - "No normalization needed in Python"
  - "Single pass"

comparison_notes:
  highlights:
    - "freq = [0] * k"
    - "(prefix + num) % k"
    - "No normalization in Python"
  gotchas_language_specific:
    - "Python -1 % 5 == 4 (non-negative)"
    - "Different from Java/Go where -1 % 5 == -1"
    - "This is a key Python advantage here"

review_questions:
  - "What does -1 % 5 return in Python vs Java?"
  - "Why is the frequency array size k and not n?"
  - "Trace through nums=[4,5,0,-2,-3,1], k=5"

