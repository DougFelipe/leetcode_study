schema_version: 3
solution_id: "sol:lc:3:longest_substring:go:sliding_window:v1"
problem_id: "lc:3:longest_substring_without_repeating_characters"
language: "go"
paradigm: "imperative"

approach:
  name: "Sliding Window with Hash Map"
  tags:
    - "sliding-window"
    - "hash-map"
    - "two-pointers"

complexity:
  time: "O(n)"
  space: "O(min(n, m))"

text:
  rationale_md: |
    # Rationale

    Go uses a map[byte]bool as a set equivalent for tracking characters.
    The delete() built-in removes entries from the map cleanly.

    Key advantages in Go:
    - map access with default zero value (false for bool)
    - delete() built-in for map entry removal
    - Simple for-loop syntax

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `s = "abcabcbb"`:

    1. charSet = map[byte]bool{}, left=0, maxLen=0
    2. right=0: charSet['a']=false → set true, maxLen=1
    3. right=1: charSet['b']=false → set true, maxLen=2
    4. right=2: charSet['c']=false → set true, maxLen=3
    5. right=3: charSet['a']=true → delete s[0], left=1 → set true, maxLen=3
    6. Continue... final answer = 3

pitfalls:
  - "Use delete() to remove from map, not set to false"
  - "map[byte]bool returns false for missing keys (zero value)"
  - "len(s) returns byte length; fine for ASCII"

tradeoffs:
  - "map[byte]bool is Go's idiomatic set pattern"
  - "No ternary operator; use if-else for max comparison"
  - "byte iteration works for ASCII but not full Unicode"

comparison_notes:
  highlights:
    - "map[byte]bool as set idiom"
    - "delete() built-in for clean removal"
    - "Zero value semantics simplify boolean map checks"
  gotchas_language_specific:
    - "Go has no ternary operator"
    - "s[i] returns byte, not rune"
    - "make(map[byte]bool) allocates the map"

review_questions:
  - "Why use map[byte]bool instead of map[rune]bool?"
  - "What happens with Unicode characters in Go's byte iteration?"
  - "How does Go's zero value simplify the map check?"

