complexity:
  time: "O(n)"
  space: "O(n)"

text:
  rationale_md: |
    Kotlin's `mutableMapOf(0 to 1)` initializes cleanly with a Pair.
    `getOrDefault` handles missing keys. Enhanced for loop over IntArray
    is idiomatic.

  walkthrough_md: |
    nums=[1,2,3], k=3:
    map={0:1}. num=1→prefix=1, look -2→0. num=2→prefix=3, look 0→1, count=1.
    num=3→prefix=6, look 3→1, count=2. Return 2.

pitfalls:
  - "mutableMapOf(0 to 1) for init"
  - "getOrDefault vs getOrElse"

tradeoffs:
  - "0 to 1 creates Kotlin Pair"
  - "getOrDefault is concise"

