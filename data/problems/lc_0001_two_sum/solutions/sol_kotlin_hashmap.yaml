text:
  rationale_md: |
    # Rationale

    Kotlin combines Java's robustness with modern language features.
    Null-safety and concise syntax make the HashMap solution elegant and safe.

    Key advantages in Kotlin:
    - Null-safe operations with ?. and ?.let {}
    - forEachIndexed for clean iteration
    - Extension functions for idiomatic code
    - Full Java interoperability

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `nums = [2, 7, 11, 15]` and `target = 9`:

    1. **i=0, num=2**: complement = 7
       - seen[7] returns null, ?.let doesn't execute
       - seen[2] = 0
       - Map: {2=0}

    2. **i=1, num=7**: complement = 2
       - seen[2] returns 0, ?.let executes!
       - Return intArrayOf(0, 1)

    The ?.let pattern elegantly handles the optional lookup.

pitfalls:
  - "Use mutableMapOf() not mapOf() for mutable maps"
  - "IntArray is primitive, Array<Int> is boxed"
  - "Early return inside forEachIndexed needs return@label or inline return"

tradeoffs:
  - "More concise than Java but same JVM performance"
  - "Null-safety adds slight cognitive overhead initially"
  - "Extension functions can be overused"

comparison_notes:
