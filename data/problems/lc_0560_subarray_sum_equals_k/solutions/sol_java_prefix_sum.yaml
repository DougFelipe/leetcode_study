approach:
  name: "Prefix Sum + HashMap"
  tags: ["prefix-sum", "hashmap", "oop"]

complexity:
  time: "O(n)"
  space: "O(n)"

text:
  rationale_md: |
    Java HashMap with getOrDefault for safe lookup. put(0, 1) initializes the empty prefix.
    Enhanced for-each over nums.

  walkthrough_md: |
    nums=[1,2,3], k=3:
    map={0:1}, num=1→prefix=1, look -2→0. num=2→prefix=3, look 0→1, count=1.
    num=3→prefix=6, look 3→1, count=2. Return 2.

pitfalls:
  - "getOrDefault avoids NPE"
  - "put(0,1) before loop"

tradeoffs:
  - "HashMap autoboxes int to Integer"
  - "getOrDefault is clean"

comparison_notes:
  highlights: ["prefixCount.put(0, 1)", "getOrDefault", "enhanced for"]
  gotchas_language_specific: ["Integer vs int autoboxing", "== vs .equals() for Integer"]

review_questions:
  - "What is the autoboxing cost of HashMap<Integer,Integer>?"
  - "How would you use int[] as a frequency array if values were bounded?"

