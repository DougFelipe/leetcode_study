    - "at-most-k-distinct"

complexity:
  time: "O(n)"
  space: "O(1)"

text:
  rationale_md: |
    # Rationale

    Python dict tracks fruit type frequencies. del removes keys when count
    drops to 0, keeping len(basket) accurate. dict.get(key, 0) provides
    safe default access.

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `fruits = [1,2,3,2,2]`:

    1. right=0: basket={1:1}, len=1, maxLen=1
    2. right=1: basket={1:1,2:1}, len=2, maxLen=2
    3. right=2: basket={1:1,2:1,3:1}, len=3 > 2 → shrink
       - Remove 1 → basket={2:1,3:1}, left=1, maxLen=2
    4. right=3: basket={2:2,3:1}, len=2, maxLen=3
    5. right=4: basket={2:3,3:1}, len=2, maxLen=4
    6. Return 4

pitfalls:
  - "del basket[key] removes key entirely"
  - "dict.get(key, 0) avoids KeyError"
  - "len(basket) counts distinct types"

tradeoffs:
  - "Dict is versatile for any fruit type range"
  - "del is O(1) average for dict"
  - "Generalizable to K distinct easily"

comparison_notes:
  highlights:
    - "dict for frequency tracking"
    - "del for key removal when count is 0"
    - "len(basket) for distinct count"
  gotchas_language_specific:
    - "del vs pop — del raises KeyError if missing"
    - "dict preserves insertion order in Python 3.7+"
    - "get(key, 0) vs defaultdict"

review_questions:
  - "Why must we delete keys when count reaches 0?"
  - "How would you generalize this to K baskets?"
  - "What's the relationship to problem 3 (Longest Substring Without Repeating)?"

