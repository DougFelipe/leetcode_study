  space: "O(m + n)"

text:
  rationale_md: |
    # Rationale

    Java uses HashMap with getOrDefault for frequency tracking.
    Integer comparison requires .intValue() to avoid autoboxing pitfalls.

    Key advantages in Java:
    - HashMap for O(1) frequency operations
    - getOrDefault(c, 0) for safe access
    - substring(start, end) for result

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `s = "ADOBECODEBANC"`, `t = "ABC"`:

    1. Build need map from t: {A=1, B=1, C=1}
    2. Slide window, track minStart and minLen
    3. When have == required, shrink and update
    4. Return s.substring(minStart, minStart + minLen)

pitfalls:
  - "Use .intValue() for Integer comparison, not =="
  - "getOrDefault avoids NullPointerException"
  - "Track minStart separately for substring extraction"

tradeoffs:
  - "HashMap is verbose but type-safe"
  - "Integer autoboxing overhead for char keys"
  - "substring creates new String object"

comparison_notes:
  highlights:
    - "HashMap with getOrDefault"
    - ".intValue() for safe Integer comparison"
    - "s.substring(start, end)"
  gotchas_language_specific:
    - "Integer == compares references above 127!"
    - "Must use .intValue() or .equals() for Integer comparison"
    - "char autoboxed to Character as HashMap key"

review_questions:
  - "Why is .intValue() critical for Integer comparison?"
  - "What happens without getOrDefault?"
  - "How does Java's Integer caching affect == comparison?"

