    - "character-filtering"

complexity:
  time: "O(n)"
  space: "O(1)"

text:
  rationale_md: |
    # Rationale

    JavaScript uses a regex helper to check alphanumeric characters.
    .toLowerCase() provides case-insensitive comparison.

    Key advantages in JavaScript:
    - /[a-zA-Z0-9]/.test(c) for alnum check
    - .toLowerCase() for case conversion
    - === for strict comparison

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `s = "race a car"`:

    1. left=0('r'), right=9('r') → 'r'==='r' ✓
    2. left=1('a'), right=8('a') → 'a'==='a' ✓
    3. left=2('c'), right=7('c') → 'c'==='c' ✓
    4. left=3('e'), right=6(' ') skip → right=5('a')
    5. 'e' !== 'a' → return false

pitfalls:
  - "Regex /[a-zA-Z0-9]/ not /\\w/ (\\w includes underscore)"
  - ".toLowerCase() returns string, not char"
  - "!== for strict inequality"

tradeoffs:
  - "Regex is clean but has slight overhead"
  - "Could use charCodeAt() for manual range check"
  - "Closure function for isAlnum avoids regex recompilation"

comparison_notes:
  highlights:
    - "/[a-zA-Z0-9]/.test(c) for alnum"
    - ".toLowerCase() for case conversion"
    - "Arrow function for isAlnum helper"
  gotchas_language_specific:
    - "/\\w/ includes underscore (don't use!)"
    - ".test() returns boolean"
    - "s[i] returns string of length 1"

review_questions:
  - "Why not use /\\w/ for alphanumeric?"
  - "Is there a performance concern with regex?"
  - "How does .toLowerCase() handle non-letter chars?"

