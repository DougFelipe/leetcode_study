problem_id: "lc:1559:detect_cycles_in_2d_grid"
language: "rust"
paradigm: "functional"

approach:
  name: "DFS with Parent Tracking"
  tags:
    - "dfs"
    - "parent-tracking"
    - "ownership"
    - "recursion"

complexity:
  time: "O(m * n)"
  space: "O(m * n)"

text:
  rationale_md: |
    # Rationale

    Rust uses a standalone recursive fn inside the method. The visited array
    is passed as a mutable reference. i32 coordinates avoid usize underflow
    issues with the -1 sentinel. The grid is passed as a shared reference.

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `grid = [["a","a","a","a"],...]`:

    1. Outer loop finds unvisited cells
    2. dfs() takes mutable &mut visited and shared &grid
    3. Cycle detected when visited neighbor != parent
    4. Returns true as i32 via bool

pitfalls:
  - "i32 for coords avoids usize underflow with -1 sentinel"
  - "&mut visited passed through recursion"
  - "as usize cast for indexing"

tradeoffs:
  - "Standalone fn inside method for recursion"
  - "i32 vs usize tradeoff for sentinel"
  - "vec! macro for visited init"

comparison_notes:
  highlights:
    - "i32 for parent sentinel -1"
    - "&mut Vec<Vec<bool>> for visited"
    - "Standalone fn for recursion"
  gotchas_language_specific:
    - "usize cannot be -1 (wraps around)"
    - "as usize cast needed for indexing"
    - "Rust has deep stack by default"

review_questions:
  - "Why use i32 instead of usize for coordinates?"
  - "How does Rust handle mutable reference passing in recursion?"
  - "What's the stack depth limit in Rust?"

