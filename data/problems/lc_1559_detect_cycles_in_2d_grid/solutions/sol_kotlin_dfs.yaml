approach:
  name: "DFS with Parent Tracking"
  tags:
    - "dfs"
    - "parent-tracking"
    - "local-function"

complexity:
  time: "O(m * n)"
  space: "O(m * n)"

text:
  rationale_md: |
    # Rationale

    Kotlin uses a local function `dfs` that closes over the outer scope variables.
    The in operator for range checks (`nr !in 0 until m`) is idiomatic Kotlin.
    Array(m) { BooleanArray(n) } creates a 2D Boolean array.

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `grid = [["a","a","a","a"],...]`:

    1. Local function dfs closes over grid, visited, m, n, dirs
    2. For each unvisited cell, call dfs(-1, -1) as parent sentinel
    3. When a visited non-parent same-char neighbor is found, return true

pitfalls:
  - "BooleanArray is primitive, not boxed"
  - "!in for range exclusion check"
  - "Local function can be recursive in Kotlin"

tradeoffs:
  - "Local function is cleaner than separate private method"
  - "!in 0 until m is idiomatic and readable"
  - "Array(m) { BooleanArray(n) } initializes to false"

comparison_notes:
  highlights:
    - "Local fun dfs for recursion"
    - "!in 0 until m for bounds check"
    - "Array with lambda initializer"
  gotchas_language_specific:
    - "BooleanArray vs Array<Boolean>"
    - "Char comparison with != works"
    - "Local function captures outer scope"

