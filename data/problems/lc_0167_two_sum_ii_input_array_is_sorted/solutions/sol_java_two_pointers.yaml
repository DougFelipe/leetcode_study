text:
  rationale_md: |
    # Rationale

    Java uses new int[]{} for array literal return. The standard
    two-pointer pattern is clean with while loop and if-else chain.

    Key advantages in Java:
    - int[] return avoids autoboxing
    - Simple while + if-else structure
    - Array literal new int[]{a, b} for return

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `numbers = [2,3,4]`, `target = 6`:

    1. left=0, right=2 → sum = 2+4 = 6 == target → return [1, 3]

    Single iteration finds the answer.

pitfalls:
  - "new int[]{left+1, right+1} for array return"
  - "int sum avoids overflow for constraints range"
  - "Return empty array as unreachable fallback"

tradeoffs:
  - "int[] is primitive, no autoboxing overhead"
  - "Simple if-else chain is clear"
  - "No imports needed"

comparison_notes:
  highlights:
    - "new int[]{a, b} for array literal"
    - "numbers.length for array size"
    - "Direct int comparison, no method calls"
  gotchas_language_specific:
    - "int[] return type (primitive array)"
    - "No autoboxing needed"
    - "Array bounds are 0-indexed internally"

review_questions:
  - "Why return int[] instead of List<Integer>?"
  - "How does Java handle the 1-indexed requirement?"
  - "Is there a risk of integer overflow with the sum?"

