    - "forEachIndexed cleaner than manual indexing"
    - "Extension function adds idiomatic API"
  gotchas_language_specific:
    - "mutableMapOf vs hashMapOf (latter specifies implementation)"
    - "IntArray vs Array<Int> memory differences"
    - "Non-local return only in inline functions"

