text:
  rationale_md: |
    # Rationale

    Java stores grid, visited, and dimensions as instance fields for clean
    access in the recursive helper. The 2D dirs array drives the 4-directional
    traversal. boolean[][] is auto-initialized to false.

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `grid = [["c","c","c","a"],...]`:

    1. Outer loop finds unvisited (0,0) = 'c'
    2. DFS marks (0,0) visited, explores neighbors
    3. Eventually reaches a visited 'c' neighbor != parent
    4. Returns true — cycle found in 'c' region

pitfalls:
  - "boolean[][] auto-initializes to false in Java"
  - "Instance fields avoid passing them through recursion"
  - "grid parameter shadows instance field — avoid that"

tradeoffs:
  - "Instance fields are clean but not thread-safe"
  - "2D int[][] dirs for directions"
  - "char comparison with != is fine for primitive char"

comparison_notes:
  highlights:
    - "Instance fields for shared state"
    - "boolean[][] for visited"
    - "Recursive private helper"
  gotchas_language_specific:
    - "char comparison uses != not .equals()"
    - "boolean[][] auto-initialized to false"
    - "Recursion depth may hit StackOverflow for large grids"

review_questions:
