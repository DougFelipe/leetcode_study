text:
  rationale_md: |
    # Rationale

    Kotlin's mutableMapOf with getOrDefault provides clean frequency tracking.
    The !! operator safely unwraps values known to exist. The if-expression
    cleanly handles the empty result case.

    Key advantages in Kotlin:
    - mutableMapOf for frequency maps
    - getOrDefault for safe access
    - if-expression for conditional return

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `s = "a"`, `t = "aa"`:

    1. need = {a=2}, required = 1
    2. right=0: window[a]=1, but 1 != 2 so have stays 0
    3. Loop ends with minLen = MAX_VALUE
    4. Return "" (no valid window)

pitfalls:
  - "!! operator for non-null assertion on map values"
  - "in operator for map containment check"
  - "Int.MAX_VALUE for initial minLen"

tradeoffs:
  - "!! is safe here since we check containment first"
  - "getOrDefault avoids null handling"
  - "if-expression is concise for result"

comparison_notes:
  highlights:
    - "mutableMapOf for frequency maps"
    - "getOrDefault for safe access"
    - "s.substring(start, end)"
  gotchas_language_specific:
    - "!! throws if value is null"
    - "in operator on map checks keys"
    - "s.indices for range iteration"

review_questions:
  - "When is !! safe to use in this context?"
  - "What's the difference between s.indices and 0 until s.length?"
  - "How does Kotlin's in operator work with maps?"

