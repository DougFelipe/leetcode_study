approach:
  name: "Sliding Window with MutableMap"
  tags:
    - "sliding-window"
    - "mutablemap"
    - "null-safety"

complexity:
  time: "O(n)"
  space: "O(1)"

text:
  rationale_md: |
    # Rationale

    Kotlin's mutableMapOf with getOrDefault for frequency tracking.
    The !! operator unwraps non-null values. basket.remove() deletes keys.

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `fruits = [0,1,2,2]`:

    1. Expand window, track frequencies in mutableMap
    2. When basket.size > 2, shrink from left
    3. Remove keys when count drops to 0
    4. Track maxOf(maxLen, windowSize)
    5. Return 3

pitfalls:
  - "!! is safe when we know key exists"
  - "basket.remove() returns removed value"
  - "basket.size is a property"

tradeoffs:
  - "MutableMap is idiomatic Kotlin"
  - "!! is concise but risky in general"
  - "maxOf is stdlib function"

comparison_notes:
  highlights:
    - "mutableMapOf for frequency"
    - "getOrDefault for safe init"
    - "basket.remove() for cleanup"
  gotchas_language_specific:
    - "!! throws if null"
    - "basket.size is property, not method"
    - "fruits.indices for range"

review_questions:
  - "When is !! safe to use?"
  - "What's the difference between remove and minus?"
  - "How does getOrDefault handle missing keys?"

