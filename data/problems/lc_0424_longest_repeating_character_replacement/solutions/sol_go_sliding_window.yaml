approach:
  name: "Sliding Window with Fixed Array"
  tags:
    - "sliding-window"
    - "byte-array"
    - "fixed-size"

complexity:
  time: "O(n)"
  space: "O(1)"

text:
  rationale_md: |
    # Rationale

    Go uses [26]int (stack-allocated fixed array) for frequency tracking.
    Direct byte access s[i] - 'A' gives the index. Explicit if comparison
    for maxFreq instead of math.Max.

    Key advantages in Go:
    - [26]int fixed array (zero allocation)
    - Direct byte access s[i]
    - Explicit if for maxFreq (avoids int→float conversion)

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `s = "AABABBA"`, `k = 1`:

    1. Expand window tracking freq and maxFreq
    2. When windowSize - maxFreq > k, slide left
    3. Window never shrinks, only slides
    4. Final size: len(s) - left = 7 - 3 = 4

pitfalls:
  - "[26]int is value type, not reference"
  - "s[i] returns byte, not rune"
  - "Go has no built-in max for ints (before 1.21)"

tradeoffs:
  - "Fixed array avoids heap allocation"
  - "Byte access only works for ASCII"
  - "Explicit if avoids type conversion"

comparison_notes:
  highlights:
    - "[26]int fixed array"
    - "s[i] - 'A' for byte indexing"
    - "if for max comparison"
  gotchas_language_specific:
    - "var [26]int auto-zeros"
    - "s[i] returns byte, use for range for rune"
    - "Go 1.21+ has builtin max()"

review_questions:
  - "Why use [26]int instead of map[byte]int?"
  - "What's the difference between byte and rune access?"
  - "When would map be better than fixed array?"

