text:
  rationale_md: |
    # Rationale

    Java's HashMap provides O(1) average lookup time, making it ideal for the complement search pattern.
    The OOP approach encapsulates the solution in a class with clear method signatures.

    Key advantages in Java:
    - Strong typing catches errors at compile time
    - HashMap is well-optimized in the JVM
    - Clear separation of concerns with class structure

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `nums = [2, 7, 11, 15]` and `target = 9`:

    1. **i=0, nums[i]=2**: complement = 9-2 = 7
       - containsKey(7) returns false
       - Put(2, 0) in map
       - Map: {2=0}

    2. **i=1, nums[i]=7**: complement = 9-7 = 2
       - containsKey(2) returns true!
       - Return new int[]{0, 1}

    Java's generics ensure type safety throughout.

pitfalls:
  - "Must use Integer wrapper class for HashMap keys/values"
  - "containsKey() before get() to avoid null pointer"
  - "Array initialization syntax: new int[] {...}"

tradeoffs:
  - "More verbose than Python/Kotlin"
  - "Compile-time type checking catches errors early"
  - "HashMap has boxing/unboxing overhead for primitives"

comparison_notes:
  highlights:
    - "Enterprise-ready with clear contracts"
    - "Well-documented HashMap behavior"
    - "IDE support for refactoring"
  gotchas_language_specific:
    - "int[] is a primitive array, Integer[] is object array"
    - "HashMap allows null keys (unlike Hashtable)"
    - "Must handle case where no solution exists"

