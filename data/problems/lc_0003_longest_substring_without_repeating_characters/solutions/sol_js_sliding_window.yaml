approach:
  name: "Sliding Window with Set"
  tags:
    - "sliding-window"
    - "set"
    - "two-pointers"

complexity:
  time: "O(n)"
  space: "O(min(n, m))"

text:
  rationale_md: |
    # Rationale

    JavaScript's built-in Set provides O(1) operations for the sliding window.
    The has/add/delete methods make set manipulation straightforward.

    Key advantages in JavaScript:
    - Built-in Set with has/add/delete methods
    - Math.max() for concise max comparison
    - String bracket notation for character access

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `s = "abcabcbb"`:

    1. charSet = new Set(), left=0, maxLen=0
    2. right=0: !charSet.has('a') → add, maxLen=1
    3. right=1: !charSet.has('b') → add, maxLen=2
    4. right=2: !charSet.has('c') → add, maxLen=3
    5. right=3: charSet.has('a') → delete s[0]='a', left=1 → add 'a', maxLen=3
    6. Continue... final answer = 3

pitfalls:
  - "Use Set.has() not Set.includes() (that's Array)"
  - "Set.delete() returns boolean, not the deleted element"
  - "s[i] returns single-char string, not char code"

tradeoffs:
  - "Set is simpler than Map for this use case"
  - "String bracket notation is O(1) in modern JS engines"
  - "Could use Map for index-based optimization"

comparison_notes:
  highlights:
    - "new Set() for built-in hash set"
    - "Set.has/add/delete API"
    - "Math.max() for comparison"
  gotchas_language_specific:
    - "s[i] returns string of length 1, not a char type"
    - "Set uses SameValueZero comparison"
    - "s.length is a property, not a method"

review_questions:
  - "Why use Set instead of an object for tracking characters?"
  - "What is SameValueZero comparison in Set?"
  - "How would you handle Unicode surrogate pairs?"

