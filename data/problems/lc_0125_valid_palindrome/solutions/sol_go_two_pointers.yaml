complexity:
  time: "O(n)"
  space: "O(1)"

text:
  rationale_md: |
    # Rationale

    Go requires custom helper functions isAlnum() and toLower() since
    the standard library's unicode package works with rune, not byte.
    For ASCII-only input, byte-level manipulation is efficient.

    Key advantages in Go:
    - Custom helpers for byte-level operations
    - Direct byte comparison (efficient for ASCII)
    - No function overhead for simple checks

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `s = " "`:

    1. left=0(' '), right=0(' ')
    2. left not alnum → left++ → left=1
    3. left(1) >= right(0) → loop ends
    4. Return true (empty after filtering is palindrome)

pitfalls:
  - "Custom isAlnum and toLower helpers needed"
  - "Byte-level operations work only for ASCII"
  - "s[i] accesses bytes, not runes"

tradeoffs:
  - "Custom helpers add code but are efficient"
  - "Byte operations work for ASCII constraint"
  - "Importing unicode package is alternative"

