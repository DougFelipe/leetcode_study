text:
  rationale_md: |
    # Rationale

    JavaScript's prototype-based OOP offers unique patterns for solving problems.
    ES6 Map provides O(1) lookups with proper key handling (unlike plain objects).

    Key advantages in JavaScript:
    - Prototype chain for method sharing
    - ES6 Map handles any key type correctly
    - Multiple patterns shown: constructor, factory, class
    - Functional alternative also provided

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `nums = [2, 7, 11, 15]` and `target = 9`:

    Using ES6 Map:
    1. **i=0, nums[i]=2**: complement = 7
       - seen.has(7) returns false
       - seen.set(2, 0)
       - Map: {2 => 0}

    2. **i=1, nums[i]=7**: complement = 2
       - seen.has(2) returns true!
       - Return [seen.get(2), 1] = [0, 1]

    Map's has/get/set methods are more reliable than object property access.

pitfalls:
  - "Use Map instead of {} for numeric keys (object coerces to string)"
  - "Arrow functions don't have their own 'this'"
  - "Array methods like forEach don't support early return"

tradeoffs:
  - "Prototype pattern is more memory efficient than closure pattern"
  - "ES6 class is syntactic sugar, same behavior as prototype"
  - "Map has slight overhead vs plain object, but handles edge cases"

comparison_notes:
  highlights:
    - "ES6 Map handles -0, NaN, and object keys correctly"
    - "Prototype pattern shares methods across instances"
    - "Factory function avoids 'new' keyword confusion"
  gotchas_language_specific:
    - "typeof null === 'object' (historical bug)"
    - "Array is 0-indexed, length is 1-indexed"
    - "== vs === (always use ===)"

review_questions:
