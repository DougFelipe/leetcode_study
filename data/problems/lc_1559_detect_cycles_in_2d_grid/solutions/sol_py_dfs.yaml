text:
  rationale_md: |
    # Rationale

    Python's nested function `dfs` closes over `visited`, `grid`, `m`, `n`,
    keeping the code concise. Tuple unpacking for direction deltas is idiomatic.
    Using -1 as the initial parent sentinel works since valid indices are >= 0.

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `grid = [["a","a","a","a"],["a","b","b","a"],["a","b","b","a"],["a","a","a","a"]]`:

    1. Start DFS from (0,0), mark visited
    2. Explore neighbors with same char 'a'
    3. Eventually reach a cell whose neighbor is already visited and not parent
    4. Return True — cycle detected among 'a' cells

pitfalls:
  - "dirs as list of tuples for clean unpacking"
  - "-1 sentinel for initial parent is safe since valid indices >= 0"
  - "Nested function closes over outer variables"

tradeoffs:
  - "Recursive DFS risks stack overflow for 500x500 grids"
  - "Nested function avoids class boilerplate"
  - "List comprehension for visited is clean"

comparison_notes:
  highlights:
    - "Nested function for DFS"
    - "Tuple unpacking for dirs"
    - "Closure over grid and visited"
  gotchas_language_specific:
    - "Python recursion limit is 1000 by default"
    - "sys.setrecursionlimit may be needed for large grids"
    - "List of lists for 2D visited"

