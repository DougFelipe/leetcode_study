approach:
  name: "Sliding Window with HashMap"
  tags:
    - "sliding-window"
    - "hashmap"
    - "ownership"

complexity:
  time: "O(n)"
  space: "O(1)"

text:
  rationale_md: |
    # Rationale

    Rust HashMap with entry API for frequency tracking. basket.remove()
    deletes keys. basket.len() gives distinct count. Pattern matching
    with if let for safe access.

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `fruits = [1,2,3,2,2]`:

    1. HashMap for basket
    2. entry().or_insert(0) for safe init
    3. When basket.len() > 2, shrink with get_mut and remove
    4. .max() for tracking
    5. Return 4 as i32

pitfalls:
  - "entry().or_insert(0) returns mutable ref"
  - "basket.remove() returns Option"
  - "usize for lengths, i32 for return"

tradeoffs:
  - "HashMap entry API is idiomatic"
  - "Pattern matching for safe access"
  - "Cast to i32 for LeetCode signature"

comparison_notes:
  highlights:
    - "HashMap with entry API"
    - "basket.remove() for cleanup"
    - ".max() on usize"
  gotchas_language_specific:
    - "entry returns occupied or vacant entry"
    - "get_mut returns Option of mutable ref"
    - "basket.len() for key count"

review_questions:
  - "How does the entry API avoid double lookup?"
  - "Why use if let instead of unwrap?"
  - "What happens if we don't remove keys at 0?"

