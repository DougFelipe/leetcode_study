text:
  rationale_md: |
    # Rationale

    Java uses instance fields (start, maxLen) shared between methods.
    The private expand method encapsulates the expansion logic cleanly.

    Key advantages in Java:
    - Instance fields shared across methods
    - charAt() for individual character access
    - substring() for result extraction

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `s = "cbbd"`:

    1. **i=0** ('c'): expand(0,0)→"c"; expand(0,1)→'c'!='b'
    2. **i=1** ('b'): expand(1,1)→"b"; expand(1,2)→'b'=='b'→"bb" (len=2) → update!
    3. **i=2** ('b'): expand(2,2)→"b"; expand(2,3)→'b'!='d'
    4. **i=3** ('d'): expand(3,3)→"d"

    Result: s.substring(1, 3) = "bb"

pitfalls:
  - "Instance fields reset between test cases on LeetCode"
  - "substring(start, start+maxLen) not substring(start, end-1)"
  - "charAt() is O(1) for String"

tradeoffs:
  - "Instance fields vs passing parameters"
  - "Private expand method vs inline logic"
  - "More structured OOP approach"

