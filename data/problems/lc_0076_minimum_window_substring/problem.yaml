content:
  statement_md: |
    Given two strings `s` and `t` of lengths `m` and `n` respectively, return the **minimum window
    substring** of `s` such that every character in `t` (including duplicates) is included in the window.
    If there is no such substring, return the empty string `""`.

    The testcases will be generated such that the answer is **unique**.

    **Example 1:**
    ```
    Input: s = "ADOBECODEBANC", t = "ABC"
    Output: "BANC"
    Explanation: The minimum window substring "BANC" includes 'A', 'B', and 'C' from string t.
    ```

    **Example 2:**
    ```
    Input: s = "a", t = "a"
    Output: "a"
    Explanation: The entire string s is the minimum window.
    ```

    **Example 3:**
    ```
    Input: s = "a", t = "aa"
    Output: ""
    Explanation: Both 'a's from t must be included in the window.
    Since the largest window of s only has one 'a', return empty string.
    ```

  editorial_summary_md: |
    Use a sliding window with two frequency maps: one for the required characters in t,
    and one for the current window. Track how many distinct characters are fully satisfied.
    Expand right to include more characters; shrink left to minimize the window when all
    characters are satisfied.

  key_insights:
    - "Two frequency maps: need (from t) and window (current window in s)"
    - "Track 'have' vs 'need' count of distinct satisfied characters"
    - "Expand right pointer to satisfy all required characters"
    - "Shrink left pointer to minimize window size while still valid"
    - "Update result only when all required characters are present"

  pitfalls:
    - "Must handle duplicate characters in t correctly"
    - "A character is 'satisfied' only when window count >= need count"
    - "Shrinking must decrement 'have' when a required char drops below needed"
    - "Return empty string if no valid window exists"

  review_questions:
    - "What is the difference between 'have' and 'need' counters?"
    - "When do we shrink the window?"
    - "How do we handle characters in s that are not in t?"

  editorial:
    algorithm_blueprint:
      compact_md: "Build need map from t -> Expand right -> When have == need, shrink left -> Track min window"
      mermaid:
        type: "flowchart"
        direction: "TD"
        code: |
          flowchart TD
            A["Start"] --> B["Build need map from t"]
            B --> C["left=0, have=0, minLen=INF"]
            C --> D{"right < len s?"}
            D -- "Yes" --> E["Add s right to window map"]
            E --> F{"window char == need char?"}
            F -- "Yes" --> G["have++"]
            F -- "No" --> H["skip"]
            G --> I{"have == required?"}
            H --> I
            I -- "Yes" --> J["Update min if smaller"]
            J --> K["Remove s left from window"]
            K --> L{"window char < need char?"}
            L -- "Yes" --> M["have--"]
            L -- "No" --> N["skip"]
            M --> O["left++"]
            N --> O
            O --> I
            I -- "No" --> P["right++"]
            P --> D
            D -- "No" --> Q["Return min window or empty"]

    alternative_approaches:
      - name: "Brute Force"
        idea_md: "Check all substrings of s and verify if each contains all characters of t."
        time: "O(m^2 * n)"
        space: "O(m + n)"
        preserve_indices: true
        when_to_use_md: "Never in practice — only for understanding."
        why_not_md: "Too slow for m, n up to 10^5."
        pitfalls:
          - "TLE for large inputs"
          - "Redundant character counting"

      - name: "Optimized Sliding Window with Filtered s"
        idea_md: "Pre-filter s to only include characters in t, then slide window on filtered list."
        time: "O(m + n)"
        space: "O(m + n)"
        preserve_indices: true
        when_to_use_md: "When s is much longer than t and has many irrelevant characters."
        why_not_md: "Adds complexity; standard sliding window is usually sufficient."
        pitfalls:
          - "Must store original indices"
          - "More complex implementation"

    when_not_to_use:
      heuristics_md: |
        The sliding window approach is optimal for this problem.
        Consider alternatives when:
        - Both strings are very short (brute force is simpler)
        - The problem requires ALL minimum windows, not just one
      scenarios:
        - scenario: "Need all minimum windows of same length"
          why_md: "Standard approach returns on first minimum found."
          recommended_instead:
            - name: "Modified Sliding Window"
              note_md: "Collect all windows of minimum length"

    common_mistakes:
      - mistake: "Not counting duplicate characters in t"
        why_md: "If t = 'aa', the window must contain at least 2 'a's."
        fix_md: "Use a frequency map, not a set, for tracking required characters."
        example_bad_md: |
          ```python
          need = set(t)  # Wrong! Loses duplicate info
          ```
        example_good_md: |
          ```python
          need = Counter(t)  # Correct! Tracks frequencies
          ```
        tags:
          - "duplicates"
          - "frequency"

      - mistake: "Not shrinking the window after finding a valid one"
        why_md: "The first valid window may not be the smallest."
        fix_md: "Use a while loop to shrink from the left while the window remains valid."
        tags:
          - "optimization"
          - "window-shrink"

    complexity_notes:
      compact_md: "Time: O(m + n), Space: O(m + n)"
      detailed_md: |
        ## Time Complexity: O(m + n)
        - Building need map from t: O(n)
        - Each character in s is visited at most twice (once by right, once by left)
        - Total: O(m + n)

        ## Space Complexity: O(m + n)
        - Need map: O(n) for characters in t
        - Window map: O(m) in worst case
        - Constant extra variables
      notes:
        - "Each pointer moves at most m times"
        - "Hash map operations are O(1) average"
      gotchas:
        - "Space is O(52) if only English letters, effectively O(1)"
        - "The follow-up asks for O(m + n) which this achieves"
      references:
        - label: "Minimum Window Substring"
          url: "https://leetcode.com/problems/minimum-window-substring/editorial/"

