approach:
  name: "Tail Recursive Two Pointers"
  tags:
    - "two-pointers"
    - "tail-recursion"
    - "functional"

complexity:
  time: "O(n)"
  space: "O(1)"

text:
  rationale_md: |
    # Rationale

    Scala expresses the two-pointer approach as tail recursion.
    The @tailrec annotation ensures compiler optimization to a loop.

    Key advantages in Scala:
    - @tailrec annotation guarantees optimization
    - Recursive approach is idiomatic functional Scala
    - Array(a, b) for clean return

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `numbers = [2,7,11,15]`, `target = 9`:

    1. search(0, 3): sum=17 > 9 → search(0, 2)
    2. search(0, 2): sum=13 > 9 → search(0, 1)
    3. search(0, 1): sum=9 == target → Array(1, 2)

    Tail recursion is optimized to loop by compiler.

pitfalls:
  - "@tailrec ensures the recursion is optimized"
  - "Array(left+1, right+1) for 1-indexed"
  - "numbers(i) for indexed access via apply"

tradeoffs:
  - "Tail recursion compiles to a loop (no stack overhead)"
  - "More idiomatic Scala than while loop"
  - "@tailrec catches non-tail-recursive mistakes at compile time"

comparison_notes:
  highlights:
    - "@scala.annotation.tailrec annotation"
    - "Recursive search function"
    - "Array(a, b) for return value"
  gotchas_language_specific:
    - "@tailrec fails at compile time if not tail-recursive"
    - "numbers(i) uses apply method"
    - "Array[Int] returned"

review_questions:
  - "Why is this function tail-recursive?"
  - "What does @tailrec do at compile time?"
  - "How does the compiler transform tail recursion?"

