complexity:
  time: "O(n)"
  space: "O(1)"

text:
  rationale_md: |
    # Rationale

    Java's Character class provides isLetterOrDigit() and toLowerCase() static methods.
    charAt() accesses individual characters efficiently.

    Key advantages in Java:
    - Character.isLetterOrDigit() for filtering
    - Character.toLowerCase() for case conversion
    - charAt() for O(1) character access

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `s = "race a car"`:

    1. left=0('r'), right=9('r') → 'r'=='r' ✓
    2. left=1('a'), right=8('a') → 'a'=='a' ✓
    3. left=2('c'), right=7('c') → 'c'=='c' ✓
    4. left=3('e'), right=6(' ') → skip right → right=5('a')
    5. left=3('e'), right=5('a') → 'e'!='a' → return false

pitfalls:
  - "Character.isLetterOrDigit() not isAlpha()"
  - "Character.toLowerCase() is static method"
  - "charAt() returns char primitive"

tradeoffs:
  - "Character class methods are verbose but clear"
  - "Static methods avoid object creation"
  - "char comparison with != is direct"

comparison_notes:
  highlights:
    - "Character.isLetterOrDigit(char)"
    - "Character.toLowerCase(char)"
    - "s.charAt(i) for character access"
  gotchas_language_specific:
    - "isLetterOrDigit vs isAlphabetic (latter excludes digits)"
    - "toLowerCase returns char, not String"
    - "char == char comparison is direct"

review_questions:
  - "What's the difference between isLetterOrDigit and isAlphabetic?"
  - "Why is charAt() O(1)?"
  - "Does this handle Unicode correctly?"

