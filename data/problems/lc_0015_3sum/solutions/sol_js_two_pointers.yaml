approach:
  name: "Sort + Two Pointers"
  tags:
    - "sorting"
    - "two-pointers"
    - "comparator"

complexity:
  time: "O(n²)"
  space: "O(log n)"

text:
  rationale_md: |
    # Rationale

    JavaScript requires a numeric comparator for sort: (a, b) => a - b.
    Without it, sort() converts to strings and sorts lexicographically.

    Key advantages in JavaScript:
    - Arrow function comparator for numeric sort
    - Array spread/push for result collection
    - === for strict equality

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `nums = [-1,0,1,2,-1,-4]`:

    1. nums.sort((a, b) => a - b) → [-4,-1,-1,0,1,2]
    2. i=0: -4 → no valid pairs
    3. i=1: -1 → found [-1,-1,2] and [-1,0,1]
    4. i=2: duplicate → continue

    Result: [[-1,-1,2], [-1,0,1]]

pitfalls:
  - "MUST use (a, b) => a - b comparator for numeric sort!"
  - "Default sort() converts to strings (wrong for numbers)"
  - "=== for strict comparison"

tradeoffs:
  - "Comparator needed makes sort verbose"
  - "Array.push for O(1) amortized append"
  - "Array literal [a, b, c] for triplet creation"

comparison_notes:
  highlights:
    - "sort((a, b) => a - b) for numeric sort"
    - "result.push([a, b, c]) for collection"
    - "=== strict equality for comparisons"
  gotchas_language_specific:
    - "sort() without comparator sorts as STRINGS!"
    - "[1, 11, 2].sort() → [1, 11, 2] (wrong!)"
    - "let vs const for mutable/immutable bindings"

review_questions:
  - "What happens if you forget the numeric comparator?"
  - "Why use === instead of == for comparison?"
  - "How does JavaScript's sort() handle negative numbers?"

