approach:
  name: "Sort + Two Pointers"
  tags:
    - "sorting"
    - "two-pointers"
    - "when-expression"

complexity:
  time: "O(n²)"
  space: "O(log n)"

text:
  rationale_md: |
    # Rationale

    Kotlin's when expression cleanly handles the three sum cases.
    IntArray.sort() sorts in-place and listOf() creates immutable lists.

    Key advantages in Kotlin:
    - when expression for multi-branch logic
    - IntArray.sort() in-place
    - listOf() for clean triplet creation

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `nums = [-1,0,1,2,-1,-4]`:

    1. nums.sort() → [-4,-1,-1,0,1,2]
    2. when expression routes sum == 0, sum < 0, else
    3. Found: [-1,-1,2] and [-1,0,1]

    Result: [[-1,-1,2], [-1,0,1]]

pitfalls:
  - "IntArray.sort() is in-place; Array<Int>.sort() creates new"
  - "when must have else branch for exhaustive check"
  - "listOf() creates immutable list"

tradeoffs:
  - "when is cleaner than if-else chain"
  - "mutableListOf for result, listOf for triplets"
  - "0 until n-2 range excludes endpoint"

comparison_notes:
  highlights:
    - "when expression for clean branching"
    - "listOf(a, b, c) for immutable triplet"
    - "mutableListOf for result accumulation"
  gotchas_language_specific:
    - "IntArray vs Array<Int> (primitive vs boxed)"
    - "when needs else for non-exhaustive"
    - "0 until n-2 creates IntRange"

review_questions:
  - "Why use when instead of if-else?"
  - "What's the difference between listOf and mutableListOf?"
  - "How does Kotlin's IntArray.sort() differ from sorted()?"

