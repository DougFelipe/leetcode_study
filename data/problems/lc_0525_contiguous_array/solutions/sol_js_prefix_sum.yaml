approach:
  name: "Prefix Sum + First Occurrence ES6 Map"
  tags: ["prefix-sum", "first-occurrence", "map"]

complexity:
  time: "O(n)"
  space: "O(n)"

text:
  rationale_md: |
    # Rationale

    ES6 Map with `[[0, -1]]` constructor. `.has()` for existence check before
    `.set()` preserves first occurrence. Ternary for transform. `Math.max`
    for length comparison.

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `nums = [0,1,0]`:
    1. map=Map{0=>-1}. i=0 (0): prefix=-1, not in map → map.set(-1,0)
    2. i=1 (1): prefix=0, has → maxLen=max(0,1-(-1))=2
    3. i=2 (0): prefix=-1, has → maxLen=max(2,2-0)=2
    4. Return 2

pitfalls:
  - ".has() before .set() to preserve first occurrence"
  - "new Map([[0, -1]]) for init"
  - "=== for strict comparison"

tradeoffs:
  - "Map.has() + Map.get() is two operations"
  - "Could use Map.has() with a sentinel but cleaner with has"
  - "Ternary is concise for transform"

comparison_notes:
  highlights:
    - "new Map([[0, -1]])"
    - ".has() check before .set()"
    - "nums[i] === 1 ? 1 : -1"
  gotchas_language_specific:
    - ".get() returns undefined for missing"
    - ".has() is O(1) average"
    - "Map preserves insertion order"

review_questions:
  - "Why use .has() instead of checking .get() === undefined?"
  - "What's the risk of always calling .set()?"
  - "Is there a difference between Map and plain object here?"

