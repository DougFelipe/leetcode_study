text:
  rationale_md: |
    # Rationale

    Scala's functional paradigm emphasizes immutability and tail recursion.
    This solution uses a tail-recursive loop that's optimized by the compiler.

    Key advantages in Scala:
    - Immutable Map prevents accidental mutation
    - Tail recursion is stack-safe and efficient
    - Pattern matching for clean branching
    - No `return` keyword needed (Scala 3 compatible)

  walkthrough_md: |
    # Step-by-Step Walkthrough (Tail Recursion)

    Given `nums = [2, 7, 11, 15]` and `target = 9`:

    Initial: loop(0, Map.empty)

    1. **i=0, nums(0)=2**: complement = 7
       - Map.empty.get(7) returns None
       - Recurse: loop(1, Map(2 -> 0))

    2. **i=1, nums(1)=7**: complement = 2
       - Map(2 -> 0).get(2) returns Some(0)
       - Pattern match: case Some(j) => Array(0, 1)
       - Return Array(0, 1)

    The @tailrec annotation ensures the compiler optimizes this to a loop.

pitfalls:
  - "Must use @tailrec annotation to ensure optimization"
  - "Pattern matching must be exhaustive"
  - "Scala 3 doesn't support return in loops"

tradeoffs:
  - "Tail recursion is explicit and easy to understand"
  - "Immutable Map has allocation overhead vs mutable"
  - "Pattern matching adds slight verbosity but improves safety"

