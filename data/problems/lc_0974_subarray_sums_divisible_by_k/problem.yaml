content:
  statement_md: |
    Given an integer array `nums` and an integer `k`, return the **number of non-empty subarrays**
    that have a sum **divisible by** `k`.

    A **subarray** is a contiguous part of an array.

    **Example 1:**
    ```
    Input: nums = [4,5,0,-2,-3,1], k = 5
    Output: 7
    Explanation: There are 7 subarrays with a sum divisible by k = 5:
    [4,5,0,-2,-3,1],[5],[5,0],[5,0,-2,-3],[0],[0,-2,-3],[-2,-3]
    ```

    **Example 2:**
    ```
    Input: nums = [5], k = 9
    Output: 0
    ```

  editorial_summary_md: |
    Use a running prefix sum. A subarray `sum(i,j)` is divisible by `k` iff
    `prefix[j] % k == prefix[i-1] % k` (by modular arithmetic).
    Count how many previous indices share the same remainder. Use a frequency
    array of size k (or hash map). Initialize with `remainder_count[0] = 1`
    to count subarrays from index 0. Fix negative remainders by adding k before mod.

  key_insights:
    - "sum(i,j) % k == 0 iff prefix[j] % k == prefix[i-1] % k"
    - "Track frequency of each remainder (0 to k-1) seen so far"
    - "Initialize remainder_count[0] = 1 for subarrays starting at index 0"
    - "Fix negative remainder: ((prefix % k) + k) % k in Java/Go"
    - "Python % always returns non-negative, so no fix needed"
    - "For each new remainder r, count += remainder_count[r] then increment it"

  pitfalls:
    - "Negative modulo: Java, Go, C++ can produce negative results for negative dividends"
    - "Forgetting remainder_count[0] = 1 initialization"
    - "This is NOT the same as counting subarrays with sum == k"

  review_questions:
    - "Why do we check remainder equality instead of sum equality?"
    - "How do you handle negative remainders in Java vs Python?"
    - "Why can we use an array of size k instead of a hash map?"

  editorial:
    algorithm_blueprint:
      compact_md: "Running prefix mod k -> For each remainder look up freq -> Add freq to count -> Increment freq"
      mermaid:
        type: "flowchart"
        direction: "TD"
        code: |
          flowchart TD
            A["Start"] --> B["freq array size k, freq of 0 = 1"]
            B --> C["prefix = 0, count = 0"]
            C --> D{"For each num in nums"}
            D --> E["prefix = prefix + num mod k plus k mod k"]
            E --> F["count += freq of prefix"]
            F --> G["freq of prefix ++"]
            G --> D
            D --> H["Return count"]

    alternative_approaches:
      - name: "Hash Map instead of Array"
        idea_md: "Use HashMap to track remainder frequencies instead of int[k]."
        time: "O(n)"
        space: "O(k)"
        preserve_indices: true
        when_to_use_md: "When k is very large and sparse remainders are expected."
        why_not_md: "Array of size k is always O(k) and faster due to no hashing overhead."
        pitfalls:
          - "HashMap has higher constant factor"
          - "Array is simpler and faster for bounded k"

      - name: "Brute Force"
        idea_md: "Check every pair (i,j), compute the subarray sum, check divisibility."
        time: "O(n^2)"
        space: "O(1)"
        preserve_indices: true
        when_to_use_md: "Only as a correctness baseline."
        why_not_md: "O(n^2) is too slow for n up to 3*10^4."
        pitfalls:
          - "TLE for large inputs"

    when_not_to_use:
      heuristics_md: |
        The prefix sum + remainder frequency array is the canonical O(n) solution.
        Consider alternatives when:
        - k is astronomically large (use HashMap instead)
        - You need the actual subarrays (track indices per remainder)
      scenarios:
        - scenario: "Need the actual subarrays, not just count"
          why_md: "Frequency count does not store which indices have each remainder."
          recommended_instead:
            - name: "Store indices per remainder"
              note_md: "Map remainder to list of indices, then count pairs"

    common_mistakes:
      - mistake: "Negative remainder in Java/Go"
        why_md: "In Java and Go, -3 % 5 == -3, not 2. This causes incorrect array indexing."
        fix_md: "Normalize with ((prefix % k) + k) % k before looking up the array."
        example_bad_md: |
          ```java
          int rem = prefix % k;
          count += freq[rem]; // ArrayIndexOutOfBoundsException if rem < 0
          ```
        example_good_md: |
          ```java
          int rem = ((prefix % k) + k) % k;
          count += freq[rem];
          ```
        tags:
          - "negative-modulo"
          - "language-specific"

      - mistake: "Not initializing freq[0] = 1"
        why_md: "Subarrays starting at index 0 need the empty prefix counted."
        fix_md: "Set freq[0] = 1 before the loop."
        tags:
          - "initialization"
          - "off-by-one"

    complexity_notes:
      compact_md: "Time: O(n), Space: O(k)"
      detailed_md: |
        ## Time Complexity: O(n)
        - Single pass through nums
        - Array access is O(1)
        - Total: O(n)

        ## Space Complexity: O(k)
        - Frequency array of size k
        - Running prefix is O(1)
      notes:
        - "Array of size k is O(k) space, not O(n)"
        - "k >= 2 is guaranteed"
      gotchas:
        - "k up to 10^4 — freq array is 10^4 ints = 40KB, trivial"
        - "Prefix sum can overflow int for large n with large values"
      references:
        - label: "Subarray Sums Divisible by K"
          url: "https://leetcode.com/problems/subarray-sums-divisible-by-k/editorial/"

