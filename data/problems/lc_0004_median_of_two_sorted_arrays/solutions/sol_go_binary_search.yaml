approach:
  name: "Binary Search Partition"
  tags:
    - "binary-search"
    - "partition"
    - "two-pointers"

complexity:
  time: "O(log(min(m, n)))"
  space: "O(1)"

text:
  rationale_md: |
    # Rationale

    Go uses math.MinInt64 and math.MaxInt64 as sentinel values.
    Multiple assignment allows clean slice swap.

    Key advantages in Go:
    - Multiple assignment for swap: nums1, nums2 = nums2, nums1
    - Explicit if-else (no ternary) keeps logic clear
    - Integer division is default behavior

  walkthrough_md: |
    # Step-by-Step Walkthrough

    Given `nums1 = [1,3]`, `nums2 = [2]`:

    1. len(nums1)=2 > len(nums2)=1 → swap
    2. a=[2], b=[1,3], m=1, n=2
    3. **Iteration**: partition1=0, partition2=2
       - maxLeft1=MinInt, minRight1=2, maxLeft2=3, minRight2=MaxInt
       - maxLeft2(3) > minRight1(2) → lo = 1
    4. partition1=1, partition2=1
       - maxLeft1=2, minRight1=MaxInt, maxLeft2=1, minRight2=3
       - Valid! Total odd → return max(2, 1) = 2.0

pitfalls:
  - "Go has no ternary; use if-else blocks"
  - "Custom max/min helper functions needed (Go < 1.21)"
  - "float64() conversion for return type"

tradeoffs:
  - "More verbose due to lack of ternary operator"
  - "Helper functions add code but improve readability"
  - "math.MinInt64 works as sentinel for this constraint range"

comparison_notes:
